<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --text-primary: #ffffff;
      --text-secondary: #888899;
      --border-color: #ffffff;
      --border-width: 3px;
      --border-radius: 4px;

      /* Brutalist colors */
      --color-red: #ff3333;
      --color-yellow: #ffcc00;
      --color-blue: #3366ff;
      --color-green: #33cc33;
      --color-orange: #ff6633;
      --color-purple: #9933ff;
      --color-pink: #ff33cc;
      --color-cyan: #00cccc;
    }

    body {
      font-family: 'Outfit', 'Noto Sans SC', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 72px;
      background: var(--bg-secondary);
      border-right: var(--border-width) solid var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
      z-index: 100;
    }

    .sidebar-logo {
      width: 44px;
      height: 44px;
      background: var(--color-yellow);
      color: #000;
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      margin-bottom: 20px;
    }

    .sidebar-categories {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      overflow-y: auto;
      width: 100%;
      padding: 0 8px;
    }

    .sidebar-category {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: var(--border-width) solid transparent;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .sidebar-category:hover {
      border-color: var(--border-color);
      transform: scale(1.05);
    }

    .sidebar-category.active {
      border-color: var(--color-yellow);
      background: rgba(255, 204, 0, 0.1);
    }

    .sidebar-add {
      width: 48px;
      height: 48px;
      border: var(--border-width) dashed var(--text-secondary);
      border-radius: var(--border-radius);
      background: transparent;
      color: var(--text-secondary);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin: 8px 0;
    }

    .sidebar-add:hover {
      border-color: var(--border-color);
      color: var(--text-primary);
    }

    .sidebar-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      border-top: var(--border-width) solid var(--border-color);
      width: 100%;
    }

    .action-btn {
      padding: 8px;
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      background: transparent;
      color: var(--text-primary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .action-btn:hover {
      background: var(--border-color);
      color: var(--bg-primary);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 72px;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header / Clock */
    .header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
    }

    .clock {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
    }

    .date-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #date {
      font-size: 18px;
      color: var(--text-secondary);
    }

    .lunar {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Search */
    .search-container {
      margin-bottom: 32px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-secondary);
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 16px 20px;
      max-width: 600px;
    }

    .search-bar svg {
      width: 24px;
      height: 24px;
      stroke: var(--text-secondary);
      stroke-width: 2;
      fill: none;
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
    }

    .search-bar input::placeholder {
      color: var(--text-secondary);
    }

    /* Cards Section */
    .cards-section {
      flex: 1;
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .category-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 700;
    }

    .add-card-btn {
      padding: 10px 20px;
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      background: transparent;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .add-card-btn:hover {
      background: var(--border-color);
      color: var(--bg-primary);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      grid-auto-rows: 160px;
    }

    /* Card Sizes */
    .card {
      background: var(--bg-secondary);
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      color: inherit;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 8px 8px 0 rgba(255,255,255,0.2);
    }

    .card-1x1 { grid-column: span 1; grid-row: span 1; }
    .card-1x2 { grid-column: span 1; grid-row: span 2; }
    .card-2x1 { grid-column: span 2; grid-row: span 1; }
    .card-2x2 { grid-column: span 2; grid-row: span 2; }

    .card-1x1 .card-icon,
    .card-1x2 .card-icon,
    .card-2x1 .card-icon,
    .card-2x2 .card-icon {
      font-size: 48px;
    }

    .card-2x2 .card-icon {
      font-size: 64px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      padding: 0 12px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Card Colors */
    .card[data-color="red"] { border-color: var(--color-red); }
    .card[data-color="red"]:hover { background: rgba(255,51,51,0.1); }

    .card[data-color="yellow"] { border-color: var(--color-yellow); }
    .card[data-color="yellow"]:hover { background: rgba(255,204,0,0.1); }

    .card[data-color="blue"] { border-color: var(--color-blue); }
    .card[data-color="blue"]:hover { background: rgba(51,102,255,0.1); }

    .card[data-color="green"] { border-color: var(--color-green); }
    .card[data-color="green"]:hover { background: rgba(51,204,51,0.1); }

    .card[data-color="orange"] { border-color: var(--color-orange); }
    .card[data-color="orange"]:hover { background: rgba(255,102,51,0.1); }

    .card[data-color="purple"] { border-color: var(--color-purple); }
    .card[data-color="purple"]:hover { background: rgba(153,51,255,0.1); }

    .card[data-color="pink"] { border-color: var(--color-pink); }
    .card[data-color="pink"]:hover { background: rgba(255,51,204,0.1); }

    .card[data-color="cyan"] { border-color: var(--color-cyan); }
    .card[data-color="cyan"]:hover { background: rgba(0,204,204,0.1); }

    /* Context Menu */
    .context-menu {
      position: fixed;
      background: var(--bg-secondary);
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      min-width: 160px;
      z-index: 1000;
      display: none;
      overflow: hidden;
    }

    .context-menu.visible {
      display: block;
    }

    .context-menu-divider {
      height: 1px;
      background: var(--border-color);
      margin: 4px 0;
    }

    .context-menu-item {
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.1s ease;
      font-size: 14px;
    }

    .context-menu-item:hover {
      background: var(--border-color);
      color: var(--bg-primary);
    }

    .context-menu-item.danger {
      color: var(--color-red);
    }

    .context-menu-item.danger:hover {
      background: var(--color-red);
      color: var(--text-primary);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 24px;
      min-width: 360px;
      max-width: 90vw;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-field {
      margin-bottom: 16px;
    }

    .modal-field label {
      display: block;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .modal-field input {
      width: 100%;
      padding: 12px;
      background: var(--bg-primary);
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .modal-field input:focus {
      border-color: var(--color-yellow);
    }

    .modal-field input::placeholder {
      color: var(--text-secondary);
    }

    .size-options {
      display: flex;
      gap: 8px;
    }

    .size-option {
      padding: 10px 16px;
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 14px;
    }

    .size-option:hover {
      background: rgba(255,255,255,0.1);
    }

    .size-option.active {
      background: var(--color-yellow);
      color: #000;
      border-color: var(--color-yellow);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .modal-btn.cancel {
      background: transparent;
      color: var(--text-primary);
    }

    .modal-btn.cancel:hover {
      background: rgba(255,255,255,0.1);
    }

    .modal-btn.confirm {
      background: var(--border-color);
      color: var(--bg-primary);
      font-weight: 500;
    }

    .modal-btn.confirm:hover {
      background: var(--color-yellow);
      border-color: var(--color-yellow);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-secondary);
      border: var(--border-width) solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 16px 24px;
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: var(--color-green);
    }

    .toast.error {
      border-color: var(--color-red);
    }

    /* Editable inputs in cards */
    .card.editing .card-title {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      padding: 4px 8px;
      border-radius: 2px;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      max-width: 120px;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <!-- Logo -->
      <div class="sidebar-logo">N</div>
      <!-- 分类列表 -->
      <div class="sidebar-categories" id="sidebarCategories"></div>
      <!-- 添加分类按钮 -->
      <button class="sidebar-add" id="addCategoryBtn">+</button>
      <!-- 导入导出 -->
      <div class="sidebar-actions">
        <button class="action-btn" id="importBtn">导入</button>
        <button class="action-btn" id="exportBtn">导出</button>
      </div>
    </aside>
    <main class="main-content" id="mainContent">
      <!-- 时钟 -->
      <header class="header">
        <div class="clock" id="clock">00:00</div>
        <div class="date-info">
          <span id="date">2026年5月11日 星期一</span>
          <span class="lunar" id="lunar">四月初七</span>
        </div>
      </header>
      <!-- 搜索 -->
      <div class="search-container">
        <div class="search-bar">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="搜索或输入网址..." id="searchInput">
        </div>
      </div>
      <!-- 卡片网格 -->
      <section class="cards-section" id="cardsSection">
        <div class="category-header">
          <div class="category-title">
            <span id="categoryIconDisplay">🏠</span>
            <span id="categoryNameDisplay">常用</span>
          </div>
          <button class="add-card-btn" id="addCardBtn">+ 添加卡片</button>
        </div>
        <div class="cards-grid" id="cardsGrid"></div>
      </section>
    </main>
  </div>
  <!-- 右键菜单 -->
  <div class="context-menu" id="contextMenu"></div>
  <!-- 分类弹窗 -->
  <div class="modal-overlay" id="categoryModal">
    <div class="modal">
      <div class="modal-title" id="categoryModalTitle">添加分类</div>
      <div class="modal-field">
        <label>名称</label>
        <input type="text" id="categoryNameInput" placeholder="分类名称">
      </div>
      <div class="modal-field">
        <label>图标 (emoji)</label>
        <input type="text" id="categoryIconInput" placeholder="📁">
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="categoryCancel">取消</button>
        <button class="modal-btn confirm" id="categoryConfirm">保存</button>
      </div>
    </div>
  </div>
  <!-- 卡片弹窗 -->
  <div class="modal-overlay" id="cardModal">
    <div class="modal">
      <div class="modal-title" id="cardModalTitle">添加卡片</div>
      <div class="modal-field">
        <label>标题</label>
        <input type="text" id="cardTitleInput" placeholder="卡片标题">
      </div>
      <div class="modal-field">
        <label>地址</label>
        <input type="text" id="cardUrlInput" placeholder="https://">
      </div>
      <div class="modal-field">
        <label>图标 (emoji)</label>
        <input type="text" id="cardEmojiInput" placeholder="🚀">
      </div>
      <div class="modal-field">
        <label>尺寸</label>
        <div class="size-options" id="sizeOptions">
          <div class="size-option active" data-size="1x1">1x1</div>
          <div class="size-option" data-size="1x2">1x2</div>
          <div class="size-option" data-size="2x1">2x1</div>
          <div class="size-option" data-size="2x2">2x2</div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="cardCancel">取消</button>
        <button class="modal-btn confirm" id="cardConfirm">保存</button>
      </div>
    </div>
  </div>
  <!-- Toast -->
  <div class="toast" id="toast"></div>
  <!-- 隐藏的文件输入 -->
  <input type="file" id="fileInput" accept=".json" style="display:none">
  <script>
    // 数据模型
    const defaultData = {
      version: '1.0',
      categories: [
        { id: 'cat-1', name: '常用', icon: '🏠', order: 0, createdAt: Date.now() },
        { id: 'cat-2', name: '编程', icon: '💻', order: 1, createdAt: Date.now() },
        { id: 'cat-3', name: 'AI', icon: '🤖', order: 2, createdAt: Date.now() },
      ],
      cards: [
        { id: 'card-1', categoryId: 'cat-1', title: 'GitHub', url: 'https://github.com', emoji: '🐙', size: '1x1', color: 'blue', order: 0, createdAt: Date.now() },
        { id: 'card-2', categoryId: 'cat-1', title: 'ChatGPT', url: 'https://chat.openai.com', emoji: '🤖', size: '1x1', color: 'green', order: 1, createdAt: Date.now() },
        { id: 'card-3', categoryId: 'cat-1', title: 'DeepSeek', url: 'https://deepseek.com', emoji: '🧠', size: '1x1', color: 'purple', order: 2, createdAt: Date.now() },
        { id: 'card-4', categoryId: 'cat-1', title: 'Claude', url: 'https://claude.ai', emoji: '✨', size: '1x1', color: 'orange', order: 3, createdAt: Date.now() },
        { id: 'card-5', categoryId: 'cat-1', title: 'Vercel', url: 'https://vercel.com', emoji: '▲', size: '1x1', color: 'pink', order: 4, createdAt: Date.now() },
        { id: 'card-6', categoryId: 'cat-1', title: 'Figma', url: 'https://figma.com', emoji: '🎨', size: '1x1', color: 'yellow', order: 5, createdAt: Date.now() },
        { id: 'card-7', categoryId: 'cat-2', title: 'Stack Overflow', url: 'https://stackoverflow.com', emoji: '📚', size: '1x1', color: 'orange', order: 0, createdAt: Date.now() },
        { id: 'card-8', categoryId: 'cat-2', title: 'MDN', url: 'https://developer.mozilla.org', emoji: '🦊', size: '1x1', color: 'blue', order: 1, createdAt: Date.now() },
        { id: 'card-9', categoryId: 'cat-2', title: 'npm', url: 'https://npmjs.com', emoji: '📦', size: '1x1', color: 'red', order: 2, createdAt: Date.now() },
        { id: 'card-10', categoryId: 'cat-3', title: 'Midjourney', url: 'https://midjourney.com', emoji: '🎨', size: '1x1', color: 'pink', order: 0, createdAt: Date.now() },
        { id: 'card-11', categoryId: 'cat-3', title: 'Stable Diffusion', url: 'https://stability.ai', emoji: '🖼️', size: '1x1', color: 'purple', order: 1, createdAt: Date.now() },
      ],
      settings: {}
    };

    let state = {
      categories: [],
      cards: [],
      activeCategoryId: null,
      editingCard: null,
      editingCategory: null,
      selectedCardSize: '1x1'
    };

    let currentContextCard = null;

    // 加载数据
    function loadData() {
      const saved = localStorage.getItem('navIndexData');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          state.categories = parsed.categories || [];
          state.cards = parsed.cards || [];
        } catch (e) {
          state.categories = [...defaultData.categories];
          state.cards = [...defaultData.cards];
        }
      } else {
        state.categories = [...defaultData.categories];
        state.cards = [...defaultData.cards];
      }
      // 确保至少有一个分类
      if (state.categories.length === 0) {
        state.categories = [...defaultData.categories];
      }
      state.activeCategoryId = state.categories[0]?.id || null;
    }

    // 保存数据
    function saveData() {
      const data = {
        version: '1.0',
        categories: state.categories,
        cards: state.cards,
        settings: {}
      };
      localStorage.setItem('navIndexData', JSON.stringify(data));
    }

    // 生成唯一 ID
    function generateId() {
      return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    // 页面加载时自动调用
    loadData();

    // 时钟更新
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutes}`;

      const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()]}`;
      document.getElementById('date').textContent = dateStr;

      // 简化农历
      document.getElementById('lunar').textContent = '四月初七';
    }

    // 渲染分类列表
    function renderCategories() {
      const container = document.getElementById('sidebarCategories');
      const sorted = [...state.categories].sort((a, b) => a.order - b.order);

      container.innerHTML = sorted.map(cat => `
        <div class="sidebar-category ${cat.id === state.activeCategoryId ? 'active' : ''}"
             data-id="${cat.id}"
             draggable="true">
          <span>${cat.icon}</span>
          <div class="cat-actions">
            <div class="cat-action" data-action="edit" title="编辑">✎</div>
            <div class="cat-action" data-action="delete" title="删除">✕</div>
          </div>
        </div>
      `).join('');

      // 绑定点击事件
      container.querySelectorAll('.sidebar-category').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.classList.contains('cat-action')) return;
          const id = el.dataset.id;
          state.activeCategoryId = id;
          renderCategories();
          renderCards();
        });

        el.addEventListener('dragstart', handleCategoryDragStart);
        el.addEventListener('dragover', handleCategoryDragOver);
        el.addEventListener('drop', handleCategoryDrop);
        el.addEventListener('dragend', handleCategoryDragEnd);

        // 编辑/删除按钮
        el.querySelectorAll('.cat-action').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const action = btn.dataset.action;
            const catId = el.dataset.id;
            if (action === 'edit') {
              openCategoryModal(catId);
            } else if (action === 'delete') {
              deleteCategory(catId);
            }
          });
        });
      });
    }

    // 渲染卡片网格
    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      const categoryCards = state.cards
        .filter(c => c.categoryId === state.activeCategoryId)
        .sort((a, b) => a.order - b.order);

      if (categoryCards.length === 0) {
        grid.innerHTML = `
          <div class="card-placeholder">
            <p>该分类下暂无卡片</p>
            <button class="add-card-btn" onclick="openCardModal()">+ 添加卡片</button>
          </div>
        `;
        return;
      }

      grid.innerHTML = categoryCards.map(card => `
        <div class="card card-${card.size}"
             data-id="${card.id}"
             data-color="${card.color}"
             draggable="true">
          <div class="card-icon">${card.emoji}</div>
          <div class="card-title">${card.title}</div>
        </div>
      `).join('');

      // 绑定卡片事件
      grid.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.button === 0) {
            const card = state.cards.find(c => c.id === el.dataset.id);
            if (card) window.open(card.url, '_blank');
          }
        });

        el.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showContextMenu(e, el.dataset.id);
        });

        el.addEventListener('dragstart', handleCardDragStart);
        el.addEventListener('dragover', handleCardDragOver);
        el.addEventListener('dragleave', handleCardDragLeave);
        el.addEventListener('drop', handleCardDrop);
        el.addEventListener('dragend', handleCardDragEnd);
      });

      // 更新分类头部
      const activeCat = state.categories.find(c => c.id === state.activeCategoryId);
      const iconDisplay = document.getElementById('categoryIconDisplay');
      const nameDisplay = document.getElementById('categoryNameDisplay');
      if (iconDisplay) iconDisplay.textContent = activeCat?.icon || '🏠';
      if (nameDisplay) nameDisplay.textContent = activeCat?.name || '';
    }

    // 创建分类头部（如果不存在）
    function ensureCategoryHeader() {
      const section = document.getElementById('cardsSection');
      if (!section.querySelector('.category-header')) {
        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
          <div class="category-title">
            <span id="categoryIconDisplay">🏠</span>
            <span id="categoryNameDisplay">常用</span>
          </div>
          <button class="add-card-btn" id="addCardBtn">+ 添加卡片</button>
        `;
        section.insertBefore(header, section.querySelector('.cards-grid'));
      }
    }

    // 更新分类头部
    function updateCategoryHeader() {
      const activeCat = state.categories.find(c => c.id === state.activeCategoryId);
      const iconDisplay = document.getElementById('categoryIconDisplay');
      const nameDisplay = document.getElementById('categoryNameDisplay');
      const addBtn = document.getElementById('addCardBtn');
      if (iconDisplay) iconDisplay.textContent = activeCat?.icon || '🏠';
      if (nameDisplay) nameDisplay.textContent = activeCat?.name || '';
      if (addBtn) addBtn.onclick = () => openCardModal();
    }

    // 拖拽相关函数
    let draggedCategoryId = null;

    function handleCategoryDragStart(e) {
      draggedCategoryId = e.currentTarget.dataset.id;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleCategoryDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function handleCategoryDrop(e) {
      e.preventDefault();
      const targetId = e.currentTarget.dataset.id;
      if (draggedCategoryId === targetId) return;

      const draggedIdx = state.categories.findIndex(c => c.id === draggedCategoryId);
      const targetIdx = state.categories.findIndex(c => c.id === targetId);

      const [dragged] = state.categories.splice(draggedIdx, 1);
      state.categories.splice(targetIdx, 0, dragged);

      // 更新 order
      state.categories.forEach((c, i) => c.order = i);

      saveData();
      renderCategories();
    }

    function handleCategoryDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      draggedCategoryId = null;
    }

    let draggedCardId = null;

    function handleCardDragStart(e) {
      draggedCardId = e.currentTarget.dataset.id;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleCardDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    }

    function handleCardDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    function handleCardDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');

      const targetId = e.currentTarget.dataset.id;
      if (draggedCardId === targetId) return;

      // 获取目标卡片所在分类
      const targetCard = state.cards.find(c => c.id === targetId);
      if (!targetCard) return;

      // 如果跨分类拖拽，只在同分类内排序
      const draggedCard = state.cards.find(c => c.id === draggedCardId);
      if (!draggedCard) return;

      // 如果不在同一分类，不允许拖拽
      if (draggedCard.categoryId !== targetCard.categoryId) {
        return;
      }

      const draggedIdx = state.cards.findIndex(c => c.id === draggedCardId);
      const targetIdx = state.cards.findIndex(c => c.id === targetId);

      const [dragged] = state.cards.splice(draggedIdx, 1);
      state.cards.splice(targetIdx, 0, dragged);

      // 更新同分类内的 order
      const categoryCards = state.cards
        .filter(c => c.categoryId === targetCard.categoryId)
        .sort((a, b) => a.order - b.order);
      categoryCards.forEach((c, i) => c.order = i);

      saveData();
      renderCards();
    }

    function handleCardDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      e.currentTarget.classList.remove('drag-over');
      draggedCardId = null;
    }

    function showContextMenu(e, cardId) {
      currentContextCard = state.cards.find(c => c.id === cardId);
      if (!currentContextCard) return;

      const menu = document.getElementById('contextMenu');
      menu.innerHTML = `
        <div class="context-menu-item" data-action="open">
          <span>↗</span> 在新标签页打开
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="size">
          <span>◧</span> 布局
        </div>
        <div class="size-options" id="contextSizeOptions" style="display:none; padding: 8px 16px;">
          <div class="size-option ${currentContextCard.size === '1x1' ? 'active' : ''}" data-size="1x1">1x1</div>
          <div class="size-option ${currentContextCard.size === '1x2' ? 'active' : ''}" data-size="1x2">1x2</div>
          <div class="size-option ${currentContextCard.size === '2x1' ? 'active' : ''}" data-size="2x1">2x1</div>
          <div class="size-option ${currentContextCard.size === '2x2' ? 'active' : ''}" data-size="2x2">2x2</div>
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="edit">
          <span>✎</span> 编辑卡片
        </div>
        <div class="context-menu-item danger" data-action="delete">
          <span>✕</span> 删除
        </div>
      `;

      menu.style.left = `${e.clientX}px`;
      menu.style.top = `${e.clientY}px`;
      menu.classList.add('visible');

      // 绑定菜单项事件
      menu.querySelectorAll('.context-menu-item').forEach(item => {
        item.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const action = item.dataset.action;
          handleContextAction(action);
          hideContextMenu();
        });
      });

      // 布局选项切换
      menu.querySelectorAll('.size-option').forEach(opt => {
        opt.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const size = opt.dataset.size;
          if (currentContextCard) {
            currentContextCard.size = size;
            saveData();
            renderCards();
          }
          hideContextMenu();
        });
      });

      // 布局按钮显示/隐藏子选项
      const sizeItem = menu.querySelector('[data-action="size"]');
      sizeItem.addEventListener('mouseenter', () => {
        document.getElementById('contextSizeOptions').style.display = 'flex';
      });
      sizeItem.addEventListener('mouseleave', () => {
        document.getElementById('contextSizeOptions').style.display = 'none';
      });
    }

    function hideContextMenu() {
      document.getElementById('contextMenu').classList.remove('visible');
      currentContextCard = null;
    }

    function handleContextAction(action) {
      if (!currentContextCard) return;

      switch (action) {
        case 'open':
          window.open(currentContextCard.url, '_blank');
          break;
        case 'edit':
          openCardModal(currentContextCard.id);
          break;
        case 'delete':
          deleteCard(currentContextCard.id);
          break;
      }
    }

    function openCategoryModal(categoryId = null) {
      const modal = document.getElementById('categoryModal');
      const title = document.getElementById('categoryModalTitle');
      const nameInput = document.getElementById('categoryNameInput');
      const iconInput = document.getElementById('categoryIconInput');

      if (categoryId) {
        const cat = state.categories.find(c => c.id === categoryId);
        if (!cat) return;
        state.editingCategory = cat;
        title.textContent = '编辑分类';
        nameInput.value = cat.name;
        iconInput.value = cat.icon;
      } else {
        state.editingCategory = null;
        title.textContent = '添加分类';
        nameInput.value = '';
        iconInput.value = '📁';
      }

      modal.classList.add('visible');
      nameInput.focus();
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.remove('visible');
      state.editingCategory = null;
    }

    function saveCategory() {
      const name = document.getElementById('categoryNameInput').value.trim();
      const icon = document.getElementById('categoryIconInput').value.trim() || '📁';

      if (!name) {
        showToast('请输入分类名称');
        return;
      }

      if (state.editingCategory) {
        state.editingCategory.name = name;
        state.editingCategory.icon = icon;
      } else {
        const newCat = {
          id: generateId(),
          name,
          icon,
          order: state.categories.length,
          createdAt: Date.now()
        };
        state.categories.push(newCat);
        state.activeCategoryId = newCat.id;
      }

      saveData();
      renderCategories();
      updateCategoryHeader();
      renderCards();
      closeCategoryModal();
      showToast(state.editingCategory ? '分类已更新' : '分类已添加');
    }

    function deleteCategory(categoryId) {
      const catCards = state.cards.filter(c => c.categoryId === categoryId);
      if (catCards.length > 0) {
        if (!confirm(`该分类下有 ${catCards.length} 张卡片，删除分类将同时删除所有卡片。确定删除吗？`)) {
          return;
        }
        state.cards = state.cards.filter(c => c.categoryId !== categoryId);
      }

      state.categories = state.categories.filter(c => c.id !== categoryId);

      // 如果删除了当前选中的分类，切换到第一个
      if (state.activeCategoryId === categoryId) {
        state.activeCategoryId = state.categories[0]?.id || null;
      }

      saveData();
      renderCategories();
      updateCategoryHeader();
      renderCards();
      showToast('分类已删除');
    }

    // 导出
    function exportConfig() {
      const data = {
        version: '1.0',
        categories: state.categories,
        cards: state.cards,
        exportedAt: new Date().toISOString()
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `nav-index-config-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('配置已导出');
    }

    // 导入
    function importConfig(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);

          // 验证格式
          if (!data.categories || !Array.isArray(data.categories)) {
            throw new Error('无效的配置文件格式');
          }

          // 合并数据
          if (confirm('导入将合并现有数据（新增的分类和卡片会被添加，冲突的会覆盖）。确定导入吗？')) {
            // 合并分类
            data.categories.forEach(cat => {
              const existing = state.categories.find(c => c.id === cat.id);
              if (existing) {
                Object.assign(existing, cat);
              } else {
                state.categories.push(cat);
              }
            });

            // 合并卡片
            data.cards.forEach(card => {
              const existing = state.cards.find(c => c.id === card.id);
              if (existing) {
                Object.assign(existing, card);
              } else {
                state.cards.push(card);
              }
            });

            saveData();
            renderCategories();
            updateCategoryHeader();
            renderCards();
            showToast('配置已导入');
          }
        } catch (err) {
          showToast('导入失败: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    function openCardModal(cardId = null) {
      const modal = document.getElementById('cardModal');
      const title = document.getElementById('cardModalTitle');
      const titleInput = document.getElementById('cardTitleInput');
      const urlInput = document.getElementById('cardUrlInput');
      const emojiInput = document.getElementById('cardEmojiInput');

      if (cardId) {
        const card = state.cards.find(c => c.id === cardId);
        if (!card) return;
        state.editingCard = card;
        title.textContent = '编辑卡片';
        titleInput.value = card.title;
        urlInput.value = card.url;
        emojiInput.value = card.emoji;
        state.selectedCardSize = card.size;
      } else {
        state.editingCard = null;
        title.textContent = '添加卡片';
        titleInput.value = '';
        urlInput.value = '';
        emojiInput.value = '🚀';
        state.selectedCardSize = '1x1';
      }

      // 更新尺寸选项
      document.querySelectorAll('#sizeOptions .size-option').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.size === state.selectedCardSize);
      });

      modal.classList.add('visible');
      titleInput.focus();
    }

    function closeCardModal() {
      document.getElementById('cardModal').classList.remove('visible');
      state.editingCard = null;
    }

    function saveCard() {
      const title = document.getElementById('cardTitleInput').value.trim();
      const url = document.getElementById('cardUrlInput').value.trim();
      const emoji = document.getElementById('cardEmojiInput').value.trim() || '🚀';

      if (!title) {
        showToast('请输入标题');
        return;
      }

      if (state.editingCard) {
        // 编辑
        state.editingCard.title = title;
        state.editingCard.url = url || 'https://';
        state.editingCard.emoji = emoji;
        state.editingCard.size = state.selectedCardSize;
      } else {
        // 新增
        const categoryCards = state.cards.filter(c => c.categoryId === state.activeCategoryId);
        const newCard = {
          id: generateId(),
          categoryId: state.activeCategoryId,
          title,
          url: url || 'https://',
          emoji,
          size: state.selectedCardSize,
          color: ['blue', 'green', 'purple', 'orange', 'pink', 'yellow'][Math.floor(Math.random() * 6)],
          order: categoryCards.length,
          createdAt: Date.now()
        };
        state.cards.push(newCard);
      }

      saveData();
      renderCards();
      closeCardModal();
      showToast(state.editingCard ? '卡片已更新' : '卡片已添加');
    }

    function deleteCard(cardId) {
      state.cards = state.cards.filter(c => c.id !== cardId);
      saveData();
      renderCards();
      showToast('卡片已删除');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2000);
    }

    // 尺寸选项事件
    document.querySelectorAll('#sizeOptions .size-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('#sizeOptions .size-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        state.selectedCardSize = opt.dataset.size;
      });
    });

    document.getElementById('cardCancel').addEventListener('click', closeCardModal);
    document.getElementById('cardConfirm').addEventListener('click', saveCard);
    document.getElementById('addCardBtn').addEventListener('click', () => openCardModal());

    // 分类弹窗事件
    document.getElementById('addCategoryBtn').addEventListener('click', () => openCategoryModal());
    document.getElementById('categoryCancel').addEventListener('click', closeCategoryModal);
    document.getElementById('categoryConfirm').addEventListener('click', saveCategory);

    // 导入导出事件
    document.getElementById('exportBtn').addEventListener('click', exportConfig);
    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        importConfig(file);
        e.target.value = '';
      }
    });

    // 搜索功能
    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const q = e.target.value.trim();
        if (q) {
          window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(q)}`, '_blank');
        }
      }
    });

    // 点击其他地方关闭菜单
    document.addEventListener('click', hideContextMenu);

    // 启动
    ensureCategoryHeader();
    updateClock();
    setInterval(updateClock, 1000);
    renderCategories();
    updateCategoryHeader();
    renderCards();
  </script>
</body>
</html>
