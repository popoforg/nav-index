<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f8faf8;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f4f0;
            --text-primary: #2d3a2d;
            --text-secondary: #5a6b5a;
            --text-tertiary: #8a9a8a;
            --border-color: #e0e8e0;
            --accent-green: #4a7c59;
            --accent-mint: #7cb69d;
            --accent-sage: #a8c5a8;
            --accent-lime: #c5d9a4;
            --accent-yellow: #e8d9a0;
            --accent-amber: #b8863c;
            --sidebar-width: 200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: var(--accent-mint);
            color: white;
        }

        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, #3d5c47 0%, #2d4a37 100%);
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 28px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-logo {
            font-family: 'DM Sans', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }

        .sidebar-logo span {
            color: var(--accent-lime);
        }

        .sidebar-subtitle {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .sidebar-categories {
            flex: 1;
            padding: 16px 0;
            overflow-y: auto;
        }

        .sidebar-category {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            margin: 2px 8px;
            border-radius: 10px;
        }

        .sidebar-category:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .sidebar-category.active {
            background: rgba(255, 255, 255, 0.15);
        }

        .sidebar-category.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 60%;
            background: var(--accent-lime);
            border-radius: 0 4px 4px 0;
        }

        .sidebar-category .cat-icon {
            font-size: 16px;
            width: 24px;
            text-align: center;
        }

        .sidebar-category .cat-name {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
        }

        .sidebar-category .cat-count {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-add,
        .sidebar-settings {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: rgba(255, 255, 255, 0.85);
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 8px;
        }

        .sidebar-add:hover,
        .sidebar-settings:hover {
            background: var(--accent-lime);
            color: var(--text-primary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px 48px 50px;
        }

        /* Header */
        .header {
            margin-bottom: 36px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .greeting {
            font-family: 'DM Sans', sans-serif;
            font-size: 34px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .greeting .accent {
            color: var(--accent-green);
        }

        .header-meta {
            text-align: right;
        }

        .date-display {
            font-size: 13px;
            color: var(--text-tertiary);
            letter-spacing: 0.5px;
        }

        /* Search */
        .search-container {
            margin-bottom: 32px;
        }

        .search-bar {
            display: flex;
            align-items: stretch;
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.25s;
        }

        .search-bar:focus-within {
            border-color: var(--accent-green);
            box-shadow: 0 4px 20px rgba(74, 124, 89, 0.12);
        }

        .search-bar input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
        }

        .search-bar input::placeholder {
            color: var(--text-tertiary);
        }

        .search-bar button {
            padding: 14px 22px;
            background: var(--accent-green);
            border: none;
            color: white;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-bar button:hover {
            background: var(--accent-mint);
        }

        /* Category Header */
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .category-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-title .icon {
            font-size: 18px;
        }

        .category-title .name {
            font-family: 'DM Sans', sans-serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .category-title .count {
            font-size: 11px;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            padding: 3px 10px;
            border-radius: 10px;
        }

        .add-card-btn {
            padding: 9px 16px;
            background: white;
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 10px;
        }

        .add-card-btn:hover {
            background: var(--accent-green);
            color: white;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            min-height: 72px;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-mint), var(--accent-sage));
            border-radius: 3px 3px 0 0;
            transition: width 0.25s;
        }

        .card:hover {
            border-color: var(--accent-sage);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74, 124, 89, 0.1);
        }

        .card:hover::after {
            width: 60%;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-radius: 10px;
            overflow: hidden;
            background: var(--bg-tertiary);
        }

        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card:hover .card-icon {
            transform: scale(1.08);
            transition: transform 0.25s;
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .card-desc {
            font-size: 12px;
            color: var(--text-tertiary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-title mark,
        .card-desc mark {
            background: var(--accent-yellow);
            color: var(--text-primary);
            padding: 0 2px;
            border-radius: 2px;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            background: var(--bg-tertiary);
            border: 2px dashed var(--border-color);
            border-radius: 14px;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        .empty-state p {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* Status Bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 99;
            padding: 10px 24px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .status-bar a {
            color: var(--text-tertiary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .status-bar a:hover {
            color: var(--accent-green);
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: white;
            min-width: 180px;
            z-index: 2000;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            padding: 8px 0;
            opacity: 0;
            pointer-events: none;
        }

        .context-menu.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .context-menu-item {
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.12s;
            margin: 0 6px;
            border-radius: 8px;
        }

        .context-menu-item:hover {
            background: var(--accent-green);
            color: white;
        }

        .context-menu-item.danger:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .context-menu-divider {
            height: 1px;
            background: var(--border-color);
            margin: 6px 0;
        }

        .context-menu-label {
            padding: 6px 16px 4px;
            font-size: 10px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .context-menu-back {
            padding: 10px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0 6px 4px;
            border-radius: 8px;
            transition: background 0.12s;
        }

        .context-menu-back:hover {
            background: var(--bg-tertiary);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(45, 58, 45, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: white;
            width: 90%;
            max-width: 380px;
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .modal-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-field {
            margin-bottom: 14px;
        }

        .modal-field label {
            display: block;
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .modal-field input {
            width: 100%;
            padding: 11px 13px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-primary);
            font-family: inherit;
            font-size: 14px;
            color: var(--text-primary);
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        .modal-field input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        .modal-btn {
            flex: 1;
            padding: 11px 14px;
            border: none;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }

        .modal-btn.cancel {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .modal-btn.cancel:hover {
            background: var(--border-color);
        }

        .modal-btn.confirm {
            background: var(--accent-green);
            color: white;
        }

        .modal-btn.confirm:hover {
            background: var(--accent-mint);
        }

        /* Settings Modal Styles */
        .settings-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .settings-section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .settings-section-title {
            font-size: 11px;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .settings-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .settings-action-btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .settings-action-btn:hover {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        .settings-action-icon {
            font-size: 18px;
        }

        .settings-action-label {
            font-size: 12px;
            font-weight: 500;
        }

        .settings-test-btn,
        .settings-upload-btn,
        .settings-download-btn {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .settings-test-btn {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .settings-test-btn:hover {
            background: var(--accent-sage);
        }

        .settings-upload-btn {
            background: var(--accent-green);
            color: white;
        }

        .settings-upload-btn:hover {
            background: var(--accent-mint);
        }

        .settings-download-btn {
            background: var(--accent-amber);
            color: white;
        }

        .settings-download-btn:hover {
            background: #c4965a;
        }

        .settings-status {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.5;
            min-height: 0;
            transition: all 0.2s;
            display: none;
        }

        .settings-status.visible {
            display: block;
        }

        .settings-status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .settings-status.error {
            background: #fce4ec;
            color: #c62828;
        }

        .settings-status.info {
            background: #e3f2fd;
            color: #1565c0;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
        }

        /* Animations */
        @keyframes leafIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: leafIn 0.35s ease backwards;
        }

        .cards-grid .card:nth-child(1) {
            animation-delay: 0.04s;
        }

        .cards-grid .card:nth-child(2) {
            animation-delay: 0.08s;
        }

        .cards-grid .card:nth-child(3) {
            animation-delay: 0.12s;
        }

        .cards-grid .card:nth-child(4) {
            animation-delay: 0.16s;
        }

        .cards-grid .card:nth-child(5) {
            animation-delay: 0.20s;
        }

        .cards-grid .card:nth-child(6) {
            animation-delay: 0.24s;
        }
    </style>
</head>

<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">泡泡<span>摩斯</span></div>
                <div class="sidebar-subtitle">NAV-Index</div>
            </div>
            <div class="sidebar-categories" id="sidebarCategories"></div>
            <div class="sidebar-footer">
                <button class="sidebar-add" id="addCategoryBtn">+ 分类</button>
                <button class="sidebar-settings" id="settingsBtn">⚙ 设置</button>
            </div>
        </aside>

        <main class="main-content" id="mainContent">
            <header class="header">
                <div class="greeting">
                    HELLO <span class="accent">WORLD.</span>
                </div>
                <div class="header-meta">
                    <div class="date-display" id="dateDisplay"></div>
                </div>
            </header>

            <div class="search-container">
                <div class="search-bar">
                    <input type="text" placeholder="搜索卡片..." id="searchInput">
                    <button type="button">搜索</button>
                </div>
            </div>

            <section class="category-section" id="categorySection">
                <div class="category-header">
                    <div class="category-title">
                        <span class="icon" id="categoryIconDisplay">🏠</span>
                        <span class="name" id="categoryNameDisplay">常用</span>
                        <span class="count" id="categoryCountDisplay">0</span>
                    </div>
                    <button class="add-card-btn" id="addCardBtn">+ 添加</button>
                </div>
                <div class="cards-grid" id="cardsGrid"></div>
            </section>
        </main>
    </div>

    <footer class="status-bar">
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">闽ICP备2021014924号-1</a>
    </footer>

    <div class="context-menu" id="contextMenu"></div>

    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-title" id="categoryModalTitle">添加分类</div>
            <div class="modal-field">
                <label>名称</label>
                <input type="text" id="categoryNameInput" placeholder="分类名称">
            </div>
            <div class="modal-field">
                <label>图标 (emoji)</label>
                <input type="text" id="categoryIconInput" placeholder="选填，默认 📁">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="categoryCancel">取消</button>
                <button class="modal-btn confirm" id="categoryConfirm">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="cardModal">
        <div class="modal">
            <div class="modal-title" id="cardModalTitle">添加卡片</div>
            <div class="modal-field">
                <label>标题</label>
                <input type="text" id="cardTitleInput" placeholder="卡片标题">
            </div>
            <div class="modal-field">
                <label>地址</label>
                <input type="text" id="cardUrlInput" placeholder="https://">
            </div>
            <div class="modal-field">
                <label>图标 URL (可选)</label>
                <input type="text" id="cardIconInput" placeholder="https://example.com/icon.png">
            </div>
            <div class="modal-field">
                <label>描述 (可选)</label>
                <input type="text" id="cardDescInput" placeholder="网站描述">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="cardCancel">取消</button>
                <button class="modal-btn confirm" id="cardConfirm">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal" style="max-width: 480px;">
            <div class="modal-title">设置</div>

            <div class="settings-section">
                <div class="settings-section-title">本地配置</div>
                <div class="settings-row">
                    <button class="settings-action-btn" id="exportConfigBtn">
                        <span class="settings-action-icon">📤</span>
                        <span class="settings-action-label">导出 JSON</span>
                    </button>
                    <button class="settings-action-btn" id="importConfigBtn">
                        <span class="settings-action-icon">📥</span>
                        <span class="settings-action-label">导入 JSON</span>
                    </button>
                </div>
                <input type="file" id="importFileInput" accept=".json" style="display:none">
            </div>

            <div class="settings-section">
                <div class="settings-section-title">Gist 配置</div>
                <div class="modal-field">
                    <label>Gist Token</label>
                    <input type="password" id="gistTokenInput" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <div class="modal-field">
                    <label>Gist ID</label>
                    <input type="text" id="gistIdInput" placeholder="a1b2c3d4e5f6">
                </div>
                <div class="modal-field">
                    <label>文件名</label>
                    <input type="text" id="gistFilenameInput" placeholder="nav-index.json">
                </div>
                <div class="settings-row" style="margin-top: 8px;">
                    <button class="settings-test-btn" id="testGistBtn">🔗 测试连接</button>
                    <button class="settings-upload-btn" id="uploadGistBtn">📤 上传配置</button>
                    <button class="settings-download-btn" id="downloadGistBtn">📥 下载配置</button>
                </div>
                <div id="settingsStatus" class="settings-status"></div>
            </div>

            <div class="modal-actions" style="margin-top: 24px;">
                <button class="modal-btn cancel" id="settingsClose">关闭</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <input type="file" id="fileInput" accept=".json" style="display:none">

    <script>
        const defaultData = {
            categories: [
                { id: 'cat-1', name: '常用', icon: '🏠', order: 0, createdAt: Date.now() },
                { id: 'cat-2', name: '编程', icon: '💻', order: 1, createdAt: Date.now() },
                { id: 'cat-3', name: 'AI', icon: '🤖', order: 2, createdAt: Date.now() },
            ],
            cards: [
                { id: 'card-1', categoryId: 'cat-1', title: 'GitHub', url: 'https://github.com', emoji: '🐙', size: '1x1', color: 'navy', order: 0, createdAt: Date.now(), desc: '全球最大的代码托管平台' },
                { id: 'card-2', categoryId: 'cat-1', title: 'ChatGPT', url: 'https://chat.openai.com', emoji: '🤖', size: '1x1', color: 'sage', order: 1, createdAt: Date.now(), desc: 'AI 对话助手' },
                { id: 'card-3', categoryId: 'cat-1', title: 'DeepSeek', url: 'https://deepseek.com', emoji: '🧠', size: '1x1', color: 'plum', order: 2, createdAt: Date.now(), desc: '国产大语言模型' },
                { id: 'card-4', categoryId: 'cat-1', title: 'Claude', url: 'https://claude.ai', emoji: '✨', size: '1x1', color: 'amber', order: 3, createdAt: Date.now(), desc: 'Anthropic 开发的 AI 助手' },
                { id: 'card-5', categoryId: 'cat-2', title: 'Stack Overflow', url: 'https://stackoverflow.com', emoji: '📚', size: '1x1', color: 'amber', order: 0, createdAt: Date.now(), desc: '程序员问答社区' },
                { id: 'card-6', categoryId: 'cat-2', title: 'MDN', url: 'https://developer.mozilla.org', emoji: '🦊', size: '1x1', color: 'navy', order: 1, createdAt: Date.now(), desc: 'Web 开发文档' },
                { id: 'card-7', categoryId: 'cat-3', title: 'Midjourney', url: 'https://midjourney.com', emoji: '🎨', size: '1x1', color: 'plum', order: 0, createdAt: Date.now(), desc: 'AI 图像生成工具' },
                { id: 'card-8', categoryId: 'cat-3', title: 'Stable Diffusion', url: 'https://stability.ai', emoji: '🖼️', size: '1x1', color: 'sage', order: 1, createdAt: Date.now(), desc: '开源 AI 图像生成模型' },
            ]
        };

        let state = {
            categories: [],
            cards: [],
            activeCategoryId: null,
            editingCard: null,
            editingCategory: null
        };

        let currentContextCard = null;

        function loadData() {
            const saved = localStorage.getItem('navIndexData');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.categories = parsed.categories || [];
                    state.cards = parsed.cards || [];
                } catch (e) {
                    state.categories = [...defaultData.categories];
                    state.cards = [...defaultData.cards];
                }
            } else {
                state.categories = [...defaultData.categories];
                state.cards = [...defaultData.cards];
            }
            if (state.categories.length === 0) {
                state.categories = [...defaultData.categories];
                state.cards = [...defaultData.cards];
            }
            const catIds = state.categories.map(c => c.id);
            const cardCatIds = [...new Set(state.cards.map(c => c.categoryId))];
            const validCatId = catIds.find(id => cardCatIds.includes(id)) || state.categories[0]?.id || null;
            state.activeCategoryId = validCatId;
        }

        function saveData() {
            localStorage.setItem('navIndexData', JSON.stringify({
                version: '1.0',
                categories: state.categories,
                cards: state.cards,
                settings: {}
            }));
        }

        function generateId() {
            return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        function renderCategories() {
            const container = document.getElementById('sidebarCategories');
            const sorted = [...state.categories].sort((a, b) => a.order - b.order);

            container.innerHTML = sorted.map(cat => {
                const cardCount = state.cards.filter(c => c.categoryId === cat.id).length;
                return `
                    <div class="sidebar-category ${cat.id === state.activeCategoryId ? 'active' : ''}" data-id="${cat.id}">
                        <span class="cat-icon">${cat.icon || '📁'}</span>
                        <span class="cat-name">${cat.name}</span>
                        <span class="cat-count">${cardCount}</span>
                    </div>
                `;
            }).join('');

            container.querySelectorAll('.sidebar-category').forEach(el => {
                el.addEventListener('click', () => {
                    state.activeCategoryId = el.dataset.id;
                    renderCategories();
                    renderCards();
                });

                el.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    showCategoryContextMenu(e, el.dataset.id);
                });
            });
        }

        function getFaviconUrl(url) {
            try {
                const hostname = new URL(url.startsWith('http') ? url : 'https://' + url).hostname;
                return hostname ? 'https://www.google.com/s2/favicons?domain=' + hostname + '&sz=64' : '';
            } catch {
                return '';
            }
        }

        function renderCards(searchQuery = '') {
            const grid = document.getElementById('cardsGrid');
            const query = searchQuery.toLowerCase().trim();

            let cardsToShow;
            if (query) {
                cardsToShow = state.cards
                    .filter(c => c.title.toLowerCase().includes(query) ||
                        c.url.toLowerCase().includes(query) ||
                        (c.desc && c.desc.toLowerCase().includes(query)))
                    .sort((a, b) => a.order - b.order);
            } else {
                cardsToShow = state.cards
                    .filter(c => c.categoryId === state.activeCategoryId)
                    .sort((a, b) => a.order - b.order);
            }

            if (cardsToShow.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📂</span>
                        <p>${query ? '未找到匹配的卡片' : '该分类下暂无卡片'}</p>
                    </div>
                `;
            } else {
                grid.innerHTML = cardsToShow.map((card, i) => `
                    <div class="card" data-id="${card.id}" draggable="true" style="animation-delay: ${i * 0.04}s">
                        <div class="card-icon">
                            <img src="${card.icon || getFaviconUrl(card.url)}" alt="${card.title}" onerror="this.style.display='none'">
                        </div>
                        <div class="card-content">
                            <div class="card-title">${highlightMatch(card.title, query)}</div>
                            <div class="card-desc">${highlightMatch(card.desc || card.url, query)}</div>
                        </div>
                    </div>
                `).join('');

                grid.querySelectorAll('.card').forEach(el => {
                    el.addEventListener('click', (e) => {
                        if (e.button === 0) {
                            const card = state.cards.find(c => c.id === el.dataset.id);
                            if (card) window.open(card.url, '_blank');
                        }
                    });

                    el.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        showContextMenu(e, el.dataset.id);
                    });

                    el.addEventListener('dragstart', handleCardDragStart);
                    el.addEventListener('dragover', handleCardDragOver);
                    el.addEventListener('drop', handleCardDrop);
                    el.addEventListener('dragend', handleCardDragEnd);
                });
            }

            const activeCat = state.categories.find(c => c.id === state.activeCategoryId);
            document.getElementById('categoryIconDisplay').textContent = activeCat?.icon || '🏠';
            document.getElementById('categoryNameDisplay').textContent = activeCat?.name || '';
            document.getElementById('categoryCountDisplay').textContent = cardsToShow.length;
        }

        function highlightMatch(text, query) {
            if (!query || !text) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        let draggedCardId = null;

        function handleCardDragStart(e) {
            draggedCardId = e.currentTarget.dataset.id;
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleCardDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleCardDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const targetId = e.currentTarget.dataset.id;
            if (draggedCardId && targetId !== draggedCardId) {
                const draggedIdx = state.cards.findIndex(c => c.id === draggedCardId);
                const targetIdx = state.cards.findIndex(c => c.id === targetId);
                const [removed] = state.cards.splice(draggedIdx, 1);
                state.cards.splice(targetIdx, 0, removed);
                state.cards.forEach((c, i) => c.order = i);
                saveData();
                renderCards();
            }
        }

        function handleCardDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            draggedCardId = null;
        }

        function openCategoryModal(categoryId = null) {
            const titleEl = document.getElementById('categoryModalTitle');
            const nameInput = document.getElementById('categoryNameInput');
            const iconInput = document.getElementById('categoryIconInput');

            if (categoryId) {
                const cat = state.categories.find(c => c.id === categoryId);
                if (!cat) return;
                state.editingCategory = cat;
                titleEl.textContent = '编辑分类';
                nameInput.value = cat.name;
                iconInput.value = cat.icon;
            } else {
                state.editingCategory = null;
                titleEl.textContent = '添加分类';
                nameInput.value = '';
                iconInput.value = '';
            }

            document.getElementById('categoryModal').classList.add('visible');
            nameInput.focus();
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('visible');
            state.editingCategory = null;
        }

        function saveCategory() {
            const name = document.getElementById('categoryNameInput').value.trim();
            const icon = document.getElementById('categoryIconInput').value.trim();

            if (!name) {
                showToast('请输入分类名称');
                return;
            }

            if (state.editingCategory) {
                state.editingCategory.name = name;
                state.editingCategory.icon = icon;
            } else {
                const newCat = {
                    id: generateId(),
                    name,
                    icon,
                    order: state.categories.length,
                    createdAt: Date.now()
                };
                state.categories.push(newCat);
                state.activeCategoryId = newCat.id;
            }

            saveData();
            renderCategories();
            renderCards();
            closeCategoryModal();
            showToast(state.editingCategory ? '分类已更新' : '分类已添加');
        }

        function deleteCategory(categoryId) {
            const catCards = state.cards.filter(c => c.categoryId === categoryId);
            if (catCards.length > 0) {
                if (!confirm(`删除分类将同时删除 ${catCards.length} 张卡片，确定要删除吗？`)) return;
                state.cards = state.cards.filter(c => c.categoryId !== categoryId);
            }
            state.categories = state.categories.filter(c => c.id !== categoryId);
            if (state.activeCategoryId === categoryId) {
                state.activeCategoryId = state.categories[0]?.id || null;
            }
            saveData();
            renderCategories();
            renderCards();
            showToast('分类已删除');
        }

        function openCardModal(cardId = null) {
            const titleEl = document.getElementById('cardModalTitle');
            const titleInput = document.getElementById('cardTitleInput');
            const urlInput = document.getElementById('cardUrlInput');
            const iconInput = document.getElementById('cardIconInput');
            const descInput = document.getElementById('cardDescInput');

            if (cardId) {
                const card = state.cards.find(c => c.id === cardId);
                if (!card) return;
                state.editingCard = card;
                titleEl.textContent = '编辑卡片';
                titleInput.value = card.title;
                urlInput.value = card.url;
                iconInput.value = card.icon || '';
                descInput.value = card.desc || '';
            } else {
                state.editingCard = null;
                titleEl.textContent = '添加卡片';
                titleInput.value = '';
                urlInput.value = '';
                iconInput.value = '';
                descInput.value = '';
            }

            document.getElementById('cardModal').classList.add('visible');
            titleInput.focus();
        }

        function closeCardModal() {
            document.getElementById('cardModal').classList.remove('visible');
            state.editingCard = null;
        }

        function saveCard() {
            const title = document.getElementById('cardTitleInput').value.trim();
            const url = document.getElementById('cardUrlInput').value.trim();
            const icon = document.getElementById('cardIconInput').value.trim();
            const desc = document.getElementById('cardDescInput').value.trim();

            if (!title) {
                showToast('请输入标题');
                return;
            }

            if (state.editingCard) {
                state.editingCard.title = title;
                state.editingCard.url = url || 'https://';
                state.editingCard.icon = icon;
                state.editingCard.desc = desc;
            } else {
                const categoryCards = state.cards.filter(c => c.categoryId === state.activeCategoryId);
                state.cards.push({
                    id: generateId(),
                    categoryId: state.activeCategoryId,
                    title,
                    url: url || 'https://',
                    icon: icon,
                    desc: desc,
                    emoji: '🔗',
                    size: '1x1',
                    color: 'navy',
                    order: categoryCards.length,
                    createdAt: Date.now()
                });
            }

            saveData();
            renderCategories();
            renderCards();
            closeCardModal();
            showToast(state.editingCard ? '卡片已更新' : '卡片已添加');
        }

        function deleteCard(cardId) {
            state.cards = state.cards.filter(c => c.id !== cardId);
            saveData();
            renderCategories();
            renderCards();
            showToast('卡片已删除');
        }

        function showContextMenu(e, cardId) {
            currentContextCard = state.cards.find(c => c.id === cardId);
            if (!currentContextCard) return;

            const menu = document.getElementById('contextMenu');
            menu.innerHTML = `
                <div class="context-menu-item" data-action="edit"><span>✎</span> 编辑卡片</div>
                <div class="context-menu-item" data-action="move"><span>↔</span> 移动到分类</div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-item danger" data-action="delete"><span>✕</span> 删除</div>
            `;

            menu.style.left = `${e.clientX}px`;
            menu.style.top = `${e.clientY}px`;
            menu.classList.add('visible');

            menu.querySelectorAll('.context-menu-item').forEach(item => {
                item.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    const action = item.dataset.action;
                    if (action === 'edit') {
                        openCardModal(currentContextCard.id);
                        hideContextMenu();
                    } else if (action === 'delete') {
                        deleteCard(currentContextCard.id);
                        hideContextMenu();
                    } else if (action === 'move') {
                        showCategoryPicker(currentContextCard, ev);
                    }
                });
            });
        }

        function showCategoryPicker(card, e) {
            const menu = document.getElementById('contextMenu');
            const otherCategories = state.categories.filter(c => c.id !== card.categoryId);

            if (otherCategories.length === 0) {
                showToast('没有其他分类');
                return;
            }

            const rect = menu.getBoundingClientRect();

            menu.innerHTML = `
                <div class="context-menu-label">移动到分类</div>
                ${otherCategories.map(c => `
                    <div class="context-menu-item" data-action="selectCategory" data-category-id="${c.id}">
                        <span>${c.icon || '📁'}</span> ${c.name}
                    </div>
                `).join('')}
            `;

            menu.style.left = `${rect.right + 8}px`;
            menu.style.top = `${rect.top}px`;
            menu.classList.add('visible');

            menu.querySelectorAll('.context-menu-item[data-action="selectCategory"]').forEach(item => {
                item.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    const targetCategoryId = item.dataset.categoryId;
                    card.categoryId = targetCategoryId;
                    saveData();
                    renderCategories();
                    renderCards();
                    showToast(`已移动到 ${state.categories.find(c => c.id === targetCategoryId)?.name}`);
                    hideContextMenu();
                });
            });
        }

        function hideContextMenu() {
            document.getElementById('contextMenu').classList.remove('visible');
        }

        // Hide menu only when clicking outside, not on menu itself
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.context-menu')) {
                hideContextMenu();
            }
        });

        function showCategoryContextMenu(e, categoryId) {
            const cat = state.categories.find(c => c.id === categoryId);
            if (!cat) return;

            const menu = document.getElementById('contextMenu');
            menu.innerHTML = `
                <div class="context-menu-item" data-action="edit"><span>✎</span> 编辑分类</div>
                <div class="context-menu-item danger" data-action="delete"><span>✕</span> 删除</div>
            `;

            menu.style.left = `${e.clientX}px`;
            menu.style.top = `${e.clientY}px`;
            menu.classList.add('visible');

            menu.querySelectorAll('.context-menu-item').forEach(item => {
                item.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    const action = item.dataset.action;
                    if (action === 'edit') openCategoryModal(cat.id);
                    else if (action === 'delete') deleteCategory(cat.id);
                    hideContextMenu();
                });
            });
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('visible');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('visible');
        }

        function exportConfig() {
            const data = JSON.stringify({
                version: '1.0',
                categories: state.categories,
                cards: state.cards,
                settings: {}
            }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'nav-index-config.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('配置已导出');
        }

        // File import - select a .json file
        document.getElementById('importFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.categories && data.cards) {
                        state.categories = data.categories;
                        state.cards = data.cards;
                        saveData();
                        renderCategories();
                        renderCards();
                        e.target.value = '';
                        closeSettingsModal();
                        showToast('配置已导入');
                    } else {
                        showToast('配置格式无效');
                    }
                } catch {
                    showToast('JSON 解析失败');
                }
            };
            reader.readAsText(file);
        });

        function importConfig() {
            document.getElementById('importFileInput').click();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2500);
        }

        function showSettingsStatus(message, type = 'info') {
            const el = document.getElementById('settingsStatus');
            el.textContent = message;
            el.className = 'settings-status visible ' + type;
        }

        function clearSettingsStatus() {
            const el = document.getElementById('settingsStatus');
            el.className = 'settings-status';
        }

        // Gist Functions
        function getGistConfig() {
            return {
                token: document.getElementById('gistTokenInput')?.value?.trim() || localStorage.getItem('gistToken') || '',
                id: document.getElementById('gistIdInput')?.value?.trim() || localStorage.getItem('gistId') || '',
                filename: document.getElementById('gistFilenameInput')?.value?.trim() || 'nav-index.json'
            };
        }

        function saveGistConfig(config) {
            localStorage.setItem('gistToken', config.token);
            localStorage.setItem('gistId', config.id);
        }

        async function testGistConnection() {
            const config = getGistConfig();
            if (!config.token) {
                showSettingsStatus('请填写 Gist Token', 'error');
                return;
            }

            showSettingsStatus('测试连接中...', 'info');

            try {
                const response = await fetch('https://api.github.com/gists', {
                    headers: {
                        'Authorization': `Bearer ${config.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.ok) {
                    showSettingsStatus('✓ Gist 连接成功', 'success');
                } else if (response.status === 401) {
                    showSettingsStatus('✗ Token 无效，请检查', 'error');
                } else {
                    showSettingsStatus(`✗ 连接失败 (${response.status})`, 'error');
                }
            } catch (e) {
                showSettingsStatus('✗ 连接失败', 'error');
            }
        }

        async function uploadToGist() {
            const config = getGistConfig();
            if (!config.token) {
                showSettingsStatus('请填写 Gist Token', 'error');
                return;
            }

            showSettingsStatus('上传中...', 'info');

            const payload = {
                description: '导航主页配置',
                public: false,
                files: {
                    [config.filename]: {
                        content: JSON.stringify({
                            version: '1.0',
                            categories: state.categories,
                            cards: state.cards,
                            exportedAt: new Date().toISOString()
                        }, null, 2)
                    }
                }
            };

            try {
                let url = 'https://api.github.com/gists';
                let method = 'POST';

                if (config.id) {
                    url = `https://api.github.com/gists/${config.id}`;
                    method = 'PATCH';
                    // Get existing gist to find file SHA
                    const getResp = await fetch(url, {
                        headers: {
                            'Authorization': `Bearer ${config.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (getResp.ok) {
                        const gist = await getResp.json();
                        if (gist.files[config.filename]) {
                            payload.files[config.filename].sha = gist.files[config.filename].sha;
                        }
                    }
                }

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Authorization': `Bearer ${config.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const result = await response.json();
                    if (!config.id && result.id) {
                        config.id = result.id;
                        document.getElementById('gistIdInput').value = result.id;
                    }
                    saveGistConfig(config);
                    showSettingsStatus('✓ 上传成功', 'success');
                } else {
                    const err = await response.json();
                    showSettingsStatus(`✗ 上传失败: ${err.message || response.status}`, 'error');
                }
            } catch (e) {
                showSettingsStatus('✗ 上传失败', 'error');
            }
        }

        async function downloadFromGist() {
            const config = getGistConfig();
            if (!config.token) {
                showSettingsStatus('请填写 Gist Token', 'error');
                return;
            }
            if (!config.id) {
                showSettingsStatus('请先填写 Gist ID 或上传配置', 'error');
                return;
            }

            showSettingsStatus('下载中...', 'info');

            try {
                const response = await fetch(`https://api.github.com/gists/${config.id}`, {
                    headers: {
                        'Authorization': `Bearer ${config.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.ok) {
                    const gist = await response.json();
                    const file = gist.files[config.filename];

                    if (file) {
                        try {
                            const data = JSON.parse(file.content);
                            if (data.categories && data.cards) {
                                state.categories = data.categories;
                                state.cards = data.cards;
                                saveData();
                                renderCategories();
                                renderCards();
                                showSettingsStatus('✓ 下载成功', 'success');
                            } else {
                                showSettingsStatus('✗ 配置格式无效', 'error');
                            }
                        } catch (e) {
                            showSettingsStatus('✗ JSON 解析失败', 'error');
                        }
                    } else {
                        showSettingsStatus('✗ 文件不存在', 'error');
                    }
                } else if (response.status === 404) {
                    showSettingsStatus('✗ Gist 不存在', 'error');
                } else {
                    showSettingsStatus(`✗ 下载失败 (${response.status})`, 'error');
                }
            } catch (e) {
                showSettingsStatus('✗ 下载失败', 'error');
            }
        }

        // Event Listeners
        document.getElementById('addCategoryBtn').addEventListener('click', () => openCategoryModal());
        document.getElementById('categoryCancel').addEventListener('click', closeCategoryModal);
        document.getElementById('categoryConfirm').addEventListener('click', saveCategory);

        document.getElementById('addCardBtn').addEventListener('click', () => openCardModal());
        document.getElementById('cardCancel').addEventListener('click', closeCardModal);
        document.getElementById('cardConfirm').addEventListener('click', saveCard);

        document.getElementById('settingsBtn').addEventListener('click', () => {
            const config = getGistConfig();
            document.getElementById('gistTokenInput').value = config.token;
            document.getElementById('gistIdInput').value = config.id;
            document.getElementById('gistFilenameInput').value = config.filename || 'nav-index.json';
            clearSettingsStatus();
            document.getElementById('settingsModal').classList.add('visible');
        });
        document.getElementById('settingsClose').addEventListener('click', closeSettingsModal);
        document.getElementById('exportConfigBtn').addEventListener('click', exportConfig);
        document.getElementById('importConfigBtn').addEventListener('click', importConfig);
        document.getElementById('testGistBtn').addEventListener('click', testGistConnection);
        document.getElementById('uploadGistBtn').addEventListener('click', uploadToGist);
        document.getElementById('downloadGistBtn').addEventListener('click', downloadFromGist);

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCards(e.target.value.trim());
        });

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                e.target.value = '';
                renderCards('');
            }
        });

        document.addEventListener('contextmenu', (e) => {
            if (!e.target.closest('.context-menu')) {
                hideContextMenu();
            }
        });

        // Prevent context menu clicks from closing it
        document.getElementById('contextMenu').addEventListener('click', (e) => {
            e.stopPropagation();
        });

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('visible');
                }
            });
        });

        // Init
        loadData();
        renderCategories();
        renderCards();

        const now = new Date();
        const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
        document.getElementById('dateDisplay').textContent = dateStr;
    </script>
</body>

</html>
