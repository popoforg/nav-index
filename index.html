<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #faf9f7;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f5f3f0;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #9a9a9a;
      --border-color: #e5e2dd;
      --border-dark: #d4d0c8;
      --accent-coral: #e85a4f;
      --accent-amber: #d4a574;
      --accent-sage: #7d9a78;
      --accent-navy: #3d5a80;
      --accent-plum: #8e5a7b;
      --sidebar-width: 240px;
      --card-radius: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: var(--accent-coral);
      color: white;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 28px 24px;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-logo {
      font-family: 'Crimson Pro', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .sidebar-logo span {
      color: var(--accent-coral);
    }

    .sidebar-subtitle {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .sidebar-categories {
      flex: 1;
      padding: 16px 12px;
      overflow: visible;
    }

    .sidebar-category {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--card-radius);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      margin-bottom: 4px;
    }

    .sidebar-category:hover {
      background: var(--bg-tertiary);
    }

    .sidebar-category.active {
      background: var(--accent-coral);
      color: white;
    }

    .sidebar-category.active .cat-count {
      background: rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.9);
    }

    .sidebar-category .cat-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .sidebar-category .cat-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
    }

    .sidebar-category .cat-count {
      font-size: 11px;
      color: var(--text-tertiary);
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .sidebar-category.active .cat-count {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
    }

    .sidebar-category:hover .cat-actions {
      opacity: 1;
    }

    .sidebar-category .cat-actions {
      position: absolute;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .sidebar-category .cat-action {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .sidebar-category .cat-action:hover {
      background: var(--border-color);
    }

    .sidebar-category.active .cat-action:hover {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .sidebar-add {
      margin: 8px 12px;
      padding: 12px 16px;
      border: 1px dashed var(--border-dark);
      border-radius: var(--card-radius);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-add:hover {
      border-color: var(--text-primary);
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 8px;
    }

    .sidebar-footer .action-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: var(--card-radius);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      transition: all 0.2s;
      text-align: center;
    }

.sidebar-footer .action-btn:hover {
      background: var(--accent-coral);
      color: white;
      border-color: var(--accent-coral);
    }

    .sidebar-settings {
      margin: 0 12px 8px;
      padding: 10px 16px;
      border: 1px dashed var(--border-dark);
      border-radius: var(--card-radius);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-settings:hover {
      border-color: var(--accent-coral);
      color: var(--accent-coral);
      background: rgba(232, 90, 79, 0.05);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      padding: 48px 56px;
      min-width: 0;
    }

    /* Header */
    .header {
      margin-bottom: 48px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    .greeting {
      font-family: 'Crimson Pro', serif;
      font-size: 56px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -1px;
      line-height: 1.2;
    }

    .greeting .accent {
      color: var(--accent-coral);
    }

    .header-right {
      text-align: right;
    }

    .date-display {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .weather-display {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, var(--border-color), transparent);
      margin-bottom: 32px;
    }

    /* Search */
    .search-container {
      margin-bottom: 40px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px 28px;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      max-width: 100%;
    }

    .search-bar:focus-within {
      border-color: var(--accent-coral);
      box-shadow: 0 4px 24px rgba(232, 90, 79, 0.12);
    }

    .search-bar svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-tertiary);
      fill: none;
      flex-shrink: 0;
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--text-primary);
      font-family: inherit;
    }

    .search-bar input::placeholder {
      color: var(--text-tertiary);
    }

    /* Search Engine Selector */
    .search-engine-selector {
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    .current-engine {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 13px;
      transition: all 0.2s;
    }

    .current-engine:hover {
      background: var(--border-color);
    }

    .current-engine .engine-icon {
      font-size: 16px;
    }

    .current-engine .dropdown-arrow {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-left: 2px;
    }

    .search-engine-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      z-index: 100;
      min-width: 160px;
    }

    .search-engine-dropdown.visible {
      display: flex;
      animation: dropdownIn 0.15s ease;
    }

    @keyframes dropdownIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .engine-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 13px;
    }

    .engine-option:hover {
      background: var(--bg-tertiary);
    }

    .engine-option.active {
      background: rgba(232, 90, 79, 0.1);
      color: var(--accent-coral);
    }

    .engine-option .engine-icon {
      font-size: 18px;
    }

    .search-icon {
      flex-shrink: 0;
      cursor: pointer;
    }

    /* Category Section */
    .category-section {
      margin-bottom: 48px;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .category-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .category-title .icon {
      font-size: 20px;
    }

    .category-title .name {
      font-family: 'Crimson Pro', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .category-title .count {
      font-size: 12px;
      color: var(--text-tertiary);
      background: var(--bg-tertiary);
      padding: 4px 10px;
      border-radius: 12px;
    }

    .add-card-btn {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .add-card-btn:hover {
      background: var(--accent-sage);
      color: white;
      border-color: var(--accent-sage);
    }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--card-radius);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      color: inherit;
      position: relative;
      min-height: 100px;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--card-radius);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      border-color: var(--border-dark);
    }

    .card:active {
      transform: translateY(-2px);
    }

    .card-1x1 { grid-column: span 1; grid-row: span 1; }
    .card-1x2 { grid-column: span 1; grid-row: span 2; min-height: 216px; }
    .card-2x1 { grid-column: span 2; grid-row: span 1; flex-direction: row; padding: 16px 24px; }
    .card-2x2 { grid-column: span 2; grid-row: span 2; min-height: 216px; }

    .card-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border-radius: 10px;
      transition: transform 0.2s;
    }

    .card:hover .card-icon {
      transform: scale(1.1);
    }

    .card-2x1 .card-icon {
      width: 36px;
      height: 36px;
      font-size: 22px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .card-2x1 .card-title {
      font-size: 15px;
    }

    /* Card Colors */
    .card[data-color="coral"] { border-top: 3px solid var(--accent-coral); }
    .card[data-color="coral"] .card-icon { background: rgba(232, 90, 79, 0.1); }

    .card[data-color="amber"] { border-top: 3px solid var(--accent-amber); }
    .card[data-color="amber"] .card-icon { background: rgba(212, 165, 116, 0.15); }

    .card[data-color="sage"] { border-top: 3px solid var(--accent-sage); }
    .card[data-color="sage"] .card-icon { background: rgba(125, 154, 120, 0.12); }

    .card[data-color="navy"] { border-top: 3px solid var(--accent-navy); }
    .card[data-color="navy"] .card-icon { background: rgba(61, 90, 128, 0.1); }

    .card[data-color="plum"] { border-top: 3px solid var(--accent-plum); }
    .card[data-color="plum"] .card-icon { background: rgba(142, 90, 123, 0.1); }

    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-tertiary);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 14px;
      margin-bottom: 16px;
    }

    /* Context Menu */
    .context-menu {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 6px;
      min-width: 160px;
      z-index: 1000;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .context-menu.visible {
      display: block;
      animation: contextIn 0.15s ease;
    }

    @keyframes contextIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .context-menu-divider {
      height: 1px;
      background: var(--border-color);
      margin: 6px 0;
    }

    .context-menu-item {
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 13px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .context-menu-item:hover {
      background: var(--bg-tertiary);
    }

    .context-menu-item.danger {
      color: var(--accent-coral);
    }

    .context-menu-item.danger:hover {
      background: rgba(232, 90, 79, 0.08);
    }

    .context-menu-label {
      padding: 8px 14px 4px;
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .size-options {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
    }

    .size-option {
      padding: 6px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }

    .size-option:hover {
      border-color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .size-option.active {
      background: var(--text-primary);
      color: white;
      border-color: var(--text-primary);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-overlay.visible {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 28px;
      width: 380px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: modalIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-title {
      font-family: 'Crimson Pro', serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    .modal-field {
      margin-bottom: 18px;
    }

    .modal-field label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .modal-field input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .modal-field input:focus {
      border-color: var(--accent-coral);
    }

    .modal-field input::placeholder {
      color: var(--text-tertiary);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .modal-btn.cancel {
      background: transparent;
      color: var(--text-secondary);
    }

    .modal-btn.cancel:hover {
      background: var(--bg-tertiary);
    }

    .modal-btn.confirm {
      background: var(--text-primary);
      color: white;
      border-color: var(--text-primary);
    }

    .modal-btn.confirm:hover {
      background: var(--accent-coral);
      border-color: var(--accent-coral);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text-primary);
      color: white;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 3000;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    /* Dragging states */
    .card.dragging {
      opacity: 0.4;
    }

    .card.drag-over {
      border-color: var(--accent-coral);
      background: rgba(232, 90, 79, 0.02);
    }

    .sidebar-category.dragging {
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">Nav<span>.</span></div>
        <div class="sidebar-subtitle">导航主页</div>
      </div>
      <div class="sidebar-categories" id="sidebarCategories"></div>
      <button class="sidebar-add" id="addCategoryBtn">+ 添加分类</button>
      <button class="sidebar-settings" id="settingsBtn">
        <span>⚙️</span> 设置
      </button>
    </aside>
    <main class="main-content" id="mainContent">
      <header class="header">
        <div class="header-top">
          <div class="greeting">
            下午好<br><span class="accent">开始探索</span>
          </div>
          <div class="header-right">
            <div class="date-display" id="dateDisplay">2026年5月11日</div>
            <div class="weather-display">晴 26°C</div>
          </div>
        </div>
        <div class="divider"></div>
      </header>
<div class="search-container">
        <div class="search-bar">
          <div class="search-engine-selector" id="searchEngineSelector">
            <span class="current-engine" id="currentEngine">
              <span class="engine-icon" id="engineIcon">🔍</span>
              <span class="engine-name" id="engineName">百度</span>
              <span class="dropdown-arrow">▾</span>
            </span>
          </div>
          <input type="text" placeholder="搜索或输入网址，按回车跳转..." id="searchInput">
          <svg class="search-icon" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div class="search-engine-dropdown" id="searchEngineDropdown">
          <div class="engine-option active" data-engine="baidu" data-url="https://www.baidu.com/s?wd=">
            <span class="engine-icon">🔍</span>
            <span class="engine-name">百度</span>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal" style="width: 480px;">
      <div class="modal-title">⚙️ 设置</div>

      <div class="settings-tabs">

  <style>
    .settings-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .settings-tab {
      padding: 8px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      border-radius: 6px;
      transition: all 0.2s;
    }

    .settings-tab:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .settings-tab.active {
      background: var(--accent-coral);
      color: white;
    }

    .settings-panel {
      display: none;
    }

    .settings-panel.active {
      display: block;
    }

    .settings-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .settings-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .settings-action-btn {
      flex: 1;
      min-width: 120px;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-primary);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-primary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .settings-action-btn:hover {
      border-color: var(--accent-coral);
      background: rgba(232, 90, 79, 0.05);
    }

    .gist-status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .gist-status.success {
      background: rgba(125, 154, 120, 0.15);
      color: var(--accent-sage);
      border: 1px solid var(--accent-sage);
    }

    .gist-status.error {
      background: rgba(232, 90, 79, 0.1);
      color: var(--accent-coral);
      border: 1px solid var(--accent-coral);
    }
  </style>

  <script>
    // Data Model
    const defaultData = {
      version: '1.0',
      categories: [
        { id: 'cat-1', name: '常用', icon: '🏠', order: 0, createdAt: Date.now() },
        { id: 'cat-2', name: '编程', icon: '💻', order: 1, createdAt: Date.now() },
        { id: 'cat-3', name: 'AI', icon: '🤖', order: 2, createdAt: Date.now() },
      ],
      cards: [
        { id: 'card-1', categoryId: 'cat-1', title: 'GitHub', url: 'https://github.com', emoji: '🐙', size: '1x1', color: 'navy', order: 0, createdAt: Date.now() },
        { id: 'card-2', categoryId: 'cat-1', title: 'ChatGPT', url: 'https://chat.openai.com', emoji: '🤖', size: '1x1', color: 'sage', order: 1, createdAt: Date.now() },
        { id: 'card-3', categoryId: 'cat-1', title: 'DeepSeek', url: 'https://deepseek.com', emoji: '🧠', size: '1x1', color: 'plum', order: 2, createdAt: Date.now() },
        { id: 'card-4', categoryId: 'cat-1', title: 'Claude', url: 'https://claude.ai', emoji: '✨', size: '1x1', color: 'amber', order: 3, createdAt: Date.now() },
        { id: 'card-5', categoryId: 'cat-1', title: 'Vercel', url: 'https://vercel.com', emoji: '▲', size: '1x1', color: 'coral', order: 4, createdAt: Date.now() },
        { id: 'card-6', categoryId: 'cat-2', title: 'Stack Overflow', url: 'https://stackoverflow.com', emoji: '📚', size: '1x1', color: 'amber', order: 0, createdAt: Date.now() },
        { id: 'card-7', categoryId: 'cat-2', title: 'MDN', url: 'https://developer.mozilla.org', emoji: '🦊', size: '1x1', color: 'navy', order: 1, createdAt: Date.now() },
        { id: 'card-8', categoryId: 'cat-2', title: 'npm', url: 'https://npmjs.com', emoji: '📦', size: '1x1', color: 'coral', order: 2, createdAt: Date.now() },
        { id: 'card-9', categoryId: 'cat-3', title: 'Midjourney', url: 'https://midjourney.com', emoji: '🎨', size: '1x1', color: 'plum', order: 0, createdAt: Date.now() },
        { id: 'card-10', categoryId: 'cat-3', title: 'Stable Diffusion', url: 'https://stability.ai', emoji: '🖼️', size: '1x1', color: 'sage', order: 1, createdAt: Date.now() },
      ],
      settings: {}
    };

    let state = {
      categories: [],
      cards: [],
      activeCategoryId: null,
      editingCard: null,
      editingCategory: null,
      selectedCardSize: '1x1'
    };

    let currentContextCard = null;
    let currentContextCategory = null;

    // Load/Save
    function loadData() {
      const saved = localStorage.getItem('navIndexData');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          state.categories = parsed.categories || [];
          state.cards = parsed.cards || [];
        } catch (e) {
          state.categories = [...defaultData.categories];
          state.cards = [...defaultData.cards];
        }
      } else {
        state.categories = [...defaultData.categories];
        state.cards = [...defaultData.cards];
      }
      if (state.categories.length === 0) {
        state.categories = [...defaultData.categories];
      }
      state.activeCategoryId = state.categories[0]?.id || null;
    }

    function saveData() {
      localStorage.setItem('navIndexData', JSON.stringify({
        version: '1.0',
        categories: state.categories,
        cards: state.cards,
        settings: {}
      }));
    }

    function generateId() {
      return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    // Render Categories
    function renderCategories() {
      const container = document.getElementById('sidebarCategories');
      const sorted = [...state.categories].sort((a, b) => a.order - b.order);

      container.innerHTML = sorted.map(cat => {
        const cardCount = state.cards.filter(c => c.categoryId === cat.id).length;
        return `
          <div class="sidebar-category ${cat.id === state.activeCategoryId ? 'active' : ''}"
               data-id="${cat.id}" draggable="true">
            <span class="cat-icon">${cat.icon}</span>
            <span class="cat-name">${cat.name}</span>
            <span class="cat-count">${cardCount}</span>
          </div>
        `;
      }).join('');

      container.querySelectorAll('.sidebar-category').forEach(el => {
        el.addEventListener('click', () => {
          state.activeCategoryId = el.dataset.id;
          renderCategories();
          renderCards();
        });

        el.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showCategoryContextMenu(e, el.dataset.id);
        });

        el.addEventListener('dragstart', handleCategoryDragStart);
        el.addEventListener('dragover', handleCategoryDragOver);
        el.addEventListener('drop', handleCategoryDrop);
        el.addEventListener('dragend', handleCategoryDragEnd);
      });
    }

    // Render Cards
    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      const categoryCards = state.cards
        .filter(c => c.categoryId === state.activeCategoryId)
        .sort((a, b) => a.order - b.order);

      if (categoryCards.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="icon">📂</div>
            <p>该分类下暂无卡片</p>
          </div>
        `;
      } else {
        grid.innerHTML = categoryCards.map(card => `
          <div class="card card-${card.size}"
               data-id="${card.id}"
               data-color="${card.color}"
               draggable="true">
            <div class="card-icon">${card.emoji}</div>
            <div class="card-title">${card.title}</div>
          </div>
        `).join('');

        grid.querySelectorAll('.card').forEach(el => {
          el.addEventListener('click', (e) => {
            if (e.button === 0) {
              const card = state.cards.find(c => c.id === el.dataset.id);
              if (card) window.open(card.url, '_blank');
            }
          });

          el.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showContextMenu(e, el.dataset.id);
          });

          el.addEventListener('dragstart', handleCardDragStart);
          el.addEventListener('dragover', handleCardDragOver);
          el.addEventListener('dragleave', handleCardDragLeave);
          el.addEventListener('drop', handleCardDrop);
          el.addEventListener('dragend', handleCardDragEnd);
        });
      }

      // Update header
      const activeCat = state.categories.find(c => c.id === state.activeCategoryId);
      document.getElementById('categoryIconDisplay').textContent = activeCat?.icon || '🏠';
      document.getElementById('categoryNameDisplay').textContent = activeCat?.name || '';
      document.getElementById('categoryCountDisplay').textContent = categoryCards.length;
    }

    // Category Drag
    let draggedCategoryId = null;

    function handleCategoryDragStart(e) {
      draggedCategoryId = e.currentTarget.dataset.id;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleCategoryDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function handleCategoryDrop(e) {
      e.preventDefault();
      const targetId = e.currentTarget.dataset.id;
      if (draggedCategoryId === targetId) return;

      const draggedIdx = state.categories.findIndex(c => c.id === draggedCategoryId);
      const targetIdx = state.categories.findIndex(c => c.id === targetId);
      const [dragged] = state.categories.splice(draggedIdx, 1);
      state.categories.splice(targetIdx, 0, dragged);
      state.categories.forEach((c, i) => c.order = i);

      saveData();
      renderCategories();
    }

    function handleCategoryDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      draggedCategoryId = null;
    }

    // Card Drag
    let draggedCardId = null;

    function handleCardDragStart(e) {
      draggedCardId = e.currentTarget.dataset.id;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleCardDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    }

    function handleCardDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    function handleCardDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');

      const targetId = e.currentTarget.dataset.id;
      if (draggedCardId === targetId) return;

      const targetCard = state.cards.find(c => c.id === targetId);
      const draggedCard = state.cards.find(c => c.id === draggedCardId);
      if (!targetCard || !draggedCard || draggedCard.categoryId !== targetCard.categoryId) return;

      const draggedIdx = state.cards.findIndex(c => c.id === draggedCardId);
      const targetIdx = state.cards.findIndex(c => c.id === targetId);
      const [dragged] = state.cards.splice(draggedIdx, 1);
      state.cards.splice(targetIdx, 0, dragged);

      state.cards.filter(c => c.categoryId === targetCard.categoryId)
        .sort((a, b) => a.order - b.order)
        .forEach((c, i) => c.order = i);

      saveData();
      renderCards();
    }

    function handleCardDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      e.currentTarget.classList.remove('drag-over');
      draggedCardId = null;
    }

    // Context Menu - Card
    function showContextMenu(e, cardId) {
      currentContextCard = state.cards.find(c => c.id === cardId);
      if (!currentContextCard) return;

      const menu = document.getElementById('contextMenu');
      menu.innerHTML = `
        <div class="context-menu-item" data-action="open">
          <span>↗</span> 在新标签页打开
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="edit">
          <span>✎</span> 编辑卡片
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-label">布局</div>
        <div class="size-options">
          <div class="size-option ${currentContextCard.size === '1x1' ? 'active' : ''}" data-size="1x1">1x1</div>
          <div class="size-option ${currentContextCard.size === '1x2' ? 'active' : ''}" data-size="1x2">1x2</div>
          <div class="size-option ${currentContextCard.size === '2x1' ? 'active' : ''}" data-size="2x1">2x1</div>
          <div class="size-option ${currentContextCard.size === '2x2' ? 'active' : ''}" data-size="2x2">2x2</div>
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item danger" data-action="delete">
          <span>✕</span> 删除
        </div>
      `;

      menu.style.left = `${e.clientX}px`;
      menu.style.top = `${e.clientY}px`;
      menu.classList.add('visible');

      menu.querySelectorAll('.context-menu-item').forEach(item => {
        item.addEventListener('click', () => {
          const action = item.dataset.action;
          if (action === 'open') window.open(currentContextCard.url, '_blank');
          else if (action === 'edit') openCardModal(currentContextCard.id);
          else if (action === 'delete') deleteCard(currentContextCard.id);
          hideContextMenu();
        });
      });

      menu.querySelectorAll('.size-option').forEach(opt => {
        opt.addEventListener('click', () => {
          currentContextCard.size = opt.dataset.size;
          saveData();
          renderCards();
          hideContextMenu();
        });
      });
    }

    // Context Menu - Category
    function showCategoryContextMenu(e, categoryId) {
      currentContextCategory = state.categories.find(c => c.id === categoryId);
      if (!currentContextCategory) return;

      const menu = document.getElementById('contextMenu');
      menu.innerHTML = `
        <div class="context-menu-item" data-action="edit">
          <span>✎</span> 编辑分类
        </div>
        <div class="context-menu-item danger" data-action="delete">
          <span>✕</span> 删除分类
        </div>
      `;

      menu.style.left = `${e.clientX}px`;
      menu.style.top = `${e.clientY}px`;
      menu.classList.add('visible');

      menu.querySelectorAll('.context-menu-item').forEach(item => {
        item.addEventListener('click', () => {
          const action = item.dataset.action;
          if (action === 'edit') openCategoryModal(currentContextCategory.id);
          else if (action === 'delete') deleteCategory(currentContextCategory.id);
          hideContextMenu();
        });
      });
    }

    function hideContextMenu() {
      document.getElementById('contextMenu').classList.remove('visible');
      currentContextCard = null;
      currentContextCategory = null;
    }

    document.addEventListener('click', hideContextMenu);

    // Category Modal
    function openCategoryModal(categoryId = null) {
      const titleEl = document.getElementById('categoryModalTitle');
      const nameInput = document.getElementById('categoryNameInput');
      const iconInput = document.getElementById('categoryIconInput');

      if (categoryId) {
        const cat = state.categories.find(c => c.id === categoryId);
        if (!cat) return;
        state.editingCategory = cat;
        titleEl.textContent = '编辑分类';
        nameInput.value = cat.name;
        iconInput.value = cat.icon;
      } else {
        state.editingCategory = null;
        titleEl.textContent = '添加分类';
        nameInput.value = '';
        iconInput.value = '📁';
      }

      document.getElementById('categoryModal').classList.add('visible');
      nameInput.focus();
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.remove('visible');
      state.editingCategory = null;
    }

    function saveCategory() {
      const name = document.getElementById('categoryNameInput').value.trim();
      const icon = document.getElementById('categoryIconInput').value.trim() || '📁';

      if (!name) {
        showToast('请输入分类名称');
        return;
      }

      if (state.editingCategory) {
        state.editingCategory.name = name;
        state.editingCategory.icon = icon;
      } else {
        const newCat = {
          id: generateId(),
          name,
          icon,
          order: state.categories.length,
          createdAt: Date.now()
        };
        state.categories.push(newCat);
        state.activeCategoryId = newCat.id;
      }

      saveData();
      renderCategories();
      renderCards();
      closeCategoryModal();
      showToast(state.editingCategory ? '分类已更新' : '分类已添加');
    }

    function deleteCategory(categoryId) {
      const catCards = state.cards.filter(c => c.categoryId === categoryId);
      if (catCards.length > 0) {
        if (!confirm(`该分类下有 ${catCards.length} 张卡片，删除分类将同时删除所有卡片。确定删除吗？`)) return;
        state.cards = state.cards.filter(c => c.categoryId !== categoryId);
      }

      state.categories = state.categories.filter(c => c.id !== categoryId);
      if (state.activeCategoryId === categoryId) {
        state.activeCategoryId = state.categories[0]?.id || null;
      }

      saveData();
      renderCategories();
      renderCards();
      showToast('分类已删除');
    }

    // Card Modal
    function openCardModal(cardId = null) {
      const titleEl = document.getElementById('cardModalTitle');
      const titleInput = document.getElementById('cardTitleInput');
      const urlInput = document.getElementById('cardUrlInput');
      const emojiInput = document.getElementById('cardEmojiInput');

      if (cardId) {
        const card = state.cards.find(c => c.id === cardId);
        if (!card) return;
        state.editingCard = card;
        titleEl.textContent = '编辑卡片';
        titleInput.value = card.title;
        urlInput.value = card.url;
        emojiInput.value = card.emoji;
        state.selectedCardSize = card.size;
      } else {
        state.editingCard = null;
        titleEl.textContent = '添加卡片';
        titleInput.value = '';
        urlInput.value = '';
        emojiInput.value = '🚀';
        state.selectedCardSize = '1x1';
      }

      document.querySelectorAll('#sizeOptions .size-option').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.size === state.selectedCardSize);
      });

      document.getElementById('cardModal').classList.add('visible');
      titleInput.focus();
    }

    function closeCardModal() {
      document.getElementById('cardModal').classList.remove('visible');
      state.editingCard = null;
    }

    function saveCard() {
      const title = document.getElementById('cardTitleInput').value.trim();
      const url = document.getElementById('cardUrlInput').value.trim();
      const emoji = document.getElementById('cardEmojiInput').value.trim() || '🚀';

      if (!title) {
        showToast('请输入标题');
        return;
      }

      if (state.editingCard) {
        state.editingCard.title = title;
        state.editingCard.url = url || 'https://';
        state.editingCard.emoji = emoji;
        state.editingCard.size = state.selectedCardSize;
      } else {
        const categoryCards = state.cards.filter(c => c.categoryId === state.activeCategoryId);
        state.cards.push({
          id: generateId(),
          categoryId: state.activeCategoryId,
          title,
          url: url || 'https://',
          emoji,
          size: state.selectedCardSize,
          color: ['coral', 'amber', 'sage', 'navy', 'plum'][Math.floor(Math.random() * 5)],
          order: categoryCards.length,
          createdAt: Date.now()
        });
      }

      saveData();
      renderCards();
      closeCardModal();
      showToast(state.editingCard ? '卡片已更新' : '卡片已添加');
    }

    function deleteCard(cardId) {
      state.cards = state.cards.filter(c => c.id !== cardId);
      saveData();
      renderCards();
      showToast('卡片已删除');
    }

    // Import/Export
    function exportConfig() {
      const blob = new Blob([JSON.stringify({
        version: '1.0',
        categories: state.categories,
        cards: state.cards,
        exportedAt: new Date().toISOString()
      }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `nav-index-config-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('配置已导出');
    }

    function importConfig(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.categories || !Array.isArray(data.categories)) throw new Error('无效格式');

          if (confirm('导入将合并数据，确定吗？')) {
            data.categories.forEach(cat => {
              const existing = state.categories.find(c => c.id === cat.id);
              existing ? Object.assign(existing, cat) : state.categories.push(cat);
            });
            data.cards.forEach(card => {
              const existing = state.cards.find(c => c.id === card.id);
              existing ? Object.assign(existing, card) : state.cards.push(card);
            });
            saveData();
            renderCategories();
            renderCards();
            showToast('配置已导入');
          }
        } catch (err) {
          showToast('导入失败: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // Gist Sync
    function getGistSettings() {
      return {
        token: localStorage.getItem('gistToken') || '',
        id: localStorage.getItem('gistId') || '',
        filename: localStorage.getItem('gistFilename') || 'nav-index-config.json'
      };
    }

    function saveGistSettings(settings) {
      localStorage.setItem('gistToken', settings.token);
      localStorage.setItem('gistId', settings.id);
      localStorage.setItem('gistFilename', settings.filename);
    }

    function showGistStatus(message, isSuccess) {
      const status = document.getElementById('gistStatus');
      status.textContent = message;
      status.className = 'gist-status ' + (isSuccess ? 'success' : 'error');
      status.style.display = 'block';
      setTimeout(() => { status.style.display = 'none'; }, 5000);
    }

    async function gistApi(method, path, body = null, token) {
      const response = await fetch(`https://api.github.com${path}`, {
        method,
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
          'Accept': 'application/vnd.github.v3+json'
        },
        body: body ? JSON.stringify(body) : null
      });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || 'API request failed');
      }
      return data;
    }

    function getCurrentGistSettings() {
      return {
        token: document.getElementById('gistToken').value.trim(),
        id: document.getElementById('gistId').value.trim(),
        filename: document.getElementById('gistFilename').value.trim() || 'nav-index-config.json'
      };
    }

    async function testGistConnection() {
      const settings = getCurrentGistSettings();
      if (!settings.token) {
        showGistStatus('请先填写 GitHub Token', false);
        return;
      }
      if (!settings.id) {
        showGistStatus('请先填写 Gist ID', false);
        return;
      }
      try {
        await gistApi('GET', '/gists/' + settings.id, null, settings.token);
        showGistStatus('✓ 连接成功！Gist ID 有效', true);
      } catch (err) {
        showGistStatus('✗ 连接失败: ' + err.message, false);
      }
    }

    async function uploadToGist() {
      const settings = getCurrentGistSettings();
      if (!settings.token) {
        showGistStatus('请先填写 GitHub Token', false);
        return;
      }
      if (!settings.id) {
        showGistStatus('请先填写 Gist ID', false);
        return;
      }

      const configData = {
        version: '1.0',
        categories: state.categories,
        cards: state.cards,
        exportedAt: new Date().toISOString()
      };

      try {
        // Try to update existing gist
        const gist = await gistApi('GET', '/gists/' + settings.id, null, settings.token);
        const filename = settings.filename;
        const fileExists = gist.files && gist.files[filename];

        if (fileExists) {
          await gistApi('PATCH', '/gists/' + settings.id, {
            files: {
              [filename]: {
                content: JSON.stringify(configData, null, 2)
              }
            }
          }, settings.token);
        } else {
          await gistApi('PATCH', '/gists/' + settings.id, {
            files: {
              [filename]: {
                content: JSON.stringify(configData, null, 2)
              }
            }
          }, settings.token);
        }
        showGistStatus('✓ 上传成功！', true);
      } catch (err) {
        showGistStatus('✗ 上传失败: ' + err.message, false);
      }
    }

    async function downloadFromGist() {
      const settings = getCurrentGistSettings();
      if (!settings.token) {
        showGistStatus('请先填写 GitHub Token', false);
        return;
      }
      if (!settings.id) {
        showGistStatus('请先填写 Gist ID', false);
        return;
      }

      try {
        const gist = await gistApi('GET', '/gists/' + settings.id, null, settings.token);
        const filename = settings.filename;

        if (!gist.files || !gist.files[filename]) {
          showGistStatus('✗ Gist 中未找到文件: ' + filename, false);
          return;
        }

        const content = gist.files[filename].content;
        const data = JSON.parse(content);

        if (!data.categories || !Array.isArray(data.categories)) {
          throw new Error('无效的 Gist 数据格式');
        }

        if (confirm('下载将合并数据，确定吗？')) {
          data.categories.forEach(cat => {
            const existing = state.categories.find(c => c.id === cat.id);
            existing ? Object.assign(existing, cat) : state.categories.push(cat);
          });
          data.cards.forEach(card => {
            const existing = state.cards.find(c => c.id === card.id);
            existing ? Object.assign(existing, card) : state.cards.push(card);
          });
          saveData();
          renderCategories();
          renderCards();
          showGistStatus('✓ 下载成功！', true);
        }
      } catch (err) {
        showGistStatus('✗ 下载失败: ' + err.message, false);
      }
    }

    // Settings Modal
    function openSettingsModal() {
      const settings = getGistSettings();
      document.getElementById('gistToken').value = settings.token;
      document.getElementById('gistId').value = settings.id;
      document.getElementById('gistFilename').value = settings.filename;
      document.getElementById('settingsModal').classList.add('visible');
    }

    function closeSettingsModal() {
      // Save Gist settings before closing
      saveGistSettings(getCurrentGistSettings());
      document.getElementById('settingsModal').classList.remove('visible');
    }

    // Settings tab switching
    document.querySelectorAll('.settings-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
      });
    });

    document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);
    document.getElementById('settingsClose').addEventListener('click', closeSettingsModal);

    // Local tab buttons
    document.getElementById('importBtn2').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });
    document.getElementById('exportBtn2').addEventListener('click', exportConfig);

    // Gist buttons
    document.getElementById('gistTestBtn').addEventListener('click', testGistConnection);
    document.getElementById('gistUploadBtn').addEventListener('click', uploadToGist);
    document.getElementById('gistDownloadBtn').addEventListener('click', downloadFromGist);

    // Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2000);
    }

    // Event Listeners
    document.getElementById('addCategoryBtn').addEventListener('click', () => openCategoryModal());
    document.getElementById('categoryCancel').addEventListener('click', closeCategoryModal);
    document.getElementById('categoryConfirm').addEventListener('click', saveCategory);

    document.getElementById('addCardBtn').addEventListener('click', () => openCardModal());
    document.getElementById('cardCancel').addEventListener('click', closeCardModal);
    document.getElementById('cardConfirm').addEventListener('click', saveCard);

    document.querySelectorAll('#sizeOptions .size-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('#sizeOptions .size-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        state.selectedCardSize = opt.dataset.size;
      });
    });

    document.getElementById('fileInput').addEventListener('change', (e) => {
      if (e.target.files[0]) {
        importConfig(e.target.files[0]);
        e.target.value = '';
      }
    });

    // Search Engine functionality
    let currentSearchEngine = {
      name: '百度',
      icon: '🔍',
      url: 'https://www.baidu.com/s?wd='
    };

    const searchEngines = [
      { name: '百度', icon: '🔍', url: 'https://www.baidu.com/s?wd=' },
      { name: '必应', icon: '🌐', url: 'https://www.bing.com/search?q=' },
      { name: 'Google', icon: '🌏', url: 'https://www.google.com/search?q=' },
      { name: '秘塔AI', icon: '🤖', url: 'https://mita.ai/s?q=' }
    ];

    function updateSearchEngineDisplay() {
      document.getElementById('engineIcon').textContent = currentSearchEngine.icon;
      document.getElementById('engineName').textContent = currentSearchEngine.name;
    }

    function selectSearchEngine(engine) {
      currentSearchEngine = engine;
      updateSearchEngineDisplay();
      document.getElementById('searchEngineDropdown').classList.remove('visible');
      document.getElementById('searchInput').focus();
    }

    // Search engine selector click
    document.getElementById('searchEngineSelector').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('searchEngineDropdown').classList.toggle('visible');
    });

    // Search engine options
    document.querySelectorAll('.engine-option').forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        const engine = searchEngines.find(eng => eng.name === opt.dataset.engine);
        if (engine) selectSearchEngine(engine);
      });
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', () => {
      document.getElementById('searchEngineDropdown').classList.remove('visible');
    });

    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const q = e.target.value.trim();
        if (q) window.open(currentSearchEngine.url + encodeURIComponent(q), '_blank');
      }
    });

    // Init
    loadData();
    renderCategories();
    renderCards();

    // Update date display
    const now = new Date();
    const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
    document.getElementById('dateDisplay').textContent = dateStr;

    // Greeting based on hour
    const hour = now.getHours();
    let greeting = '晚上好';
    if (hour < 12) greeting = '早上好';
    else if (hour < 18) greeting = '下午好';
    document.querySelector('.greeting').innerHTML = `${greeting}<br><span class="accent">开始探索</span>`;
  </script>
</body>
</html>
