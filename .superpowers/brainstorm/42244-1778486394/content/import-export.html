<h2>导入/导出配置</h2>
<p class="subtitle">配置的备份与恢复方式</p>

<div class="options">
  <div class="option" data-choice="json" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>JSON 文件</h3>
      <p>导出为 .json 文件，导入时选择文件，包含所有分类、卡片、布局数据</p>
    </div>
  </div>
  <div class="option" data-choice="clipboard" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>剪贴板 JSON</h3>
      <p>导出复制到剪贴板（可粘贴到笔记），导入时粘贴 JSON 文本即可</p>
    </div>
  </div>
  <div class="option" data-choice="both" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>两者都要</h3>
      <p>同时支持 JSON 文件导入/导出，以及剪贴板复制/粘贴</p>
    </div>
  </div>
</div>
