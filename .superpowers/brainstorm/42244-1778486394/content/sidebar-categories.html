<h2>侧边栏分类管理</h2>
<p class="subtitle">侧边栏分类的操作方式</p>

<div class="options">
  <div class="option" data-choice="inline" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>内置固定分类</h3>
      <p>预置分类（主页/编程/设计/产品/AI），不支持增删，仅支持切换选中</p>
    </div>
  </div>
  <div class="option" data-choice="manageable" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>可管理的分类</h3>
      <p>支持添加/编辑/删除分类，自定义分类名称和图标，可拖拽排序分类顺序</p>
    </div>
  </div>
</div>
