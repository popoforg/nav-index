<div class="options">

    <div class="content">
      <h3>纯前端单文件 (推荐)</h3>
      <p>HTML + CSS + JavaScript，单个 index.html 文件，无需构建步骤，直接浏览器打开即可运行</p>

      <p>React via CDN，组件化开发，状态管理更清晰，适合后续扩展</p>

  <div class="option" data-choice="vue" onclick="toggleSelect(this)">

    <div class="content">
      <h3>Vue3 单文件</h3>
