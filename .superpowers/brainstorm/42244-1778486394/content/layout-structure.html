<h2>网格布局结构</h2>
<p class="subtitle">卡片网格如何组织分类和尺寸</p>

<div class="options">
  <div class="option" data-choice="free" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>自由网格</h3>
      <p>每张卡片可自由设置 1x1 / 1x2 / 2x1 / 2x2 尺寸，自由拖拽排序</p>
    </div>
  </div>
  <div class="option" data-choice="fixed" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>固定网格</h3>
      <p>所有卡片统一 1x1 尺寸，按添加顺序自动排列，简洁整齐</p>
    </div>
  </div>
  <div class="option" data-choice="masonry" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>瀑布流</h3>
      <p>类似 Pinterest 布局，每列独立垂直排列，高度随内容自适应</p>
    </div>
  </div>
</div>
