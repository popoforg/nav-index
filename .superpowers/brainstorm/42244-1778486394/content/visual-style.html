<h2>视觉风格偏好</h2>
<p class="subtitle">选择一个最能代表你品味的风格方向</p>

<div class="options">
  <div class="option" data-choice="glass" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>玻璃拟态 Glassmorphism</h3>
      <p>磨砂玻璃背景 + 半透明卡片，参考 iOS/macOS 风格，柔和现代</p>
    </div>
  </div>
  <div class="option" data-choice="brutalist" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>粗野主义 Brutalist</h3>
      <p>大胆撞色、原始边框、显眼的网格线，个性鲜明</p>
    </div>
  </div>
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>极简禅意 Minimal Zen</h3>
      <p>大量留白、淡雅配色、精致排版，呼吸感强</p>
    </div>
  </div>
  <div class="option" data-choice="neon" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>赛博霓虹 Cyber Neon</h3>
      <p>深色背景 + 发光边框、霓虹渐变，科幻感十足</p>
    </div>
  </div>
</div>
